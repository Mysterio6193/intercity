<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>Veropay — Smart Room Service</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#efe6d4;          /* warm cream */
    --paper-2:#e7dcc3;
    --paper-3:#d8caa9;
    --ink:#16120c;            /* deep warm black */
    --ink-2:#3d3528;
    --ink-3:#6d6555;
    --ink-4:#a59c87;
    --rule:#d6c9a8;
    --rule-2:#bcab86;
    --accent:#8a6a30;         /* antique gold */
    --accent-2:#8a6a30;
    --grad:var(--ink);
    --grad-soft:var(--ink-2);
    --ok:#3a5a3a;
    --warn:#a06a1d;
    --err:#7a2818;
    /* tonal accents for tiles */
    --terra:#8a5230;
    --terra-bg:#d8c2a4;
    --sage:#5a6a4a;
    --sage-bg:#c8cdb0;
    --plum:#5a3a4a;
    --plum-bg:#cdbab8;
    --ochre:#8a6a30;
    --ochre-bg:#dcc89a;
    --teal:#3a5a5a;
    --teal-bg:#bcc9c0;
    --ink-bg:#1c1812;
    --shadow:0 0 0 transparent;
    --shadow-card:0 0 0 transparent;
    --serif:"Cormorant Garamond", "Fraunces", "Times New Roman", Georgia, serif;
    --sans:"DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
    --mono:"JetBrains Mono", ui-monospace, monospace;
    --display:"Cormorant Garamond", serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#0a0805;color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;font-weight:400}
  body{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow-x:hidden}
  @media (max-width:520px){ body{padding:0} }

  /* ── Mobile viewport shell ──────────────────────────────────────── */
  .stage{
    width:min(420px, 100vw);
    height:min(900px, 100dvh);
    background:var(--paper);
    position:relative;
    border-radius:2px;
    overflow:hidden;
    box-shadow:0 60px 160px -50px rgba(0,0,0,.8), 0 0 0 1px rgba(0,0,0,.4);
    display:flex;flex-direction:column;
    isolation:isolate;
  }
  @media (max-width:520px){
    .stage{ width:100vw; height:100dvh; border-radius:0; box-shadow:none }
  }

  /* status bar (fake) */
  .statusbar{
    height:36px;flex:0 0 36px;display:flex;align-items:center;justify-content:space-between;
    padding:0 22px;font:500 13px/1 var(--sans);
    color:var(--ink); letter-spacing:.01em;
  }
  .statusbar .right{display:flex;gap:6px;align-items:center;font-family:var(--mono);font-size:11px}
  .statusbar .dot{width:14px;height:7px;border:1px solid var(--ink);border-radius:2px;position:relative}
  .statusbar .dot::after{content:"";position:absolute;inset:1px;background:var(--ink);width:80%}

  /* screen container */
  .screen{
    flex:1 1 auto; min-height:0;
    display:flex;flex-direction:column;
    overflow:hidden;
    position:relative;
  }
  .scroll{ overflow-y:auto; overflow-x:hidden; flex:1 1 auto; -webkit-overflow-scrolling:touch; scrollbar-width:thin}
  .scroll::-webkit-scrollbar{width:6px}
  .scroll::-webkit-scrollbar-thumb{background:rgba(17,17,15,.18);border-radius:3px}

  /* ── Type ───────────────────────────────────────────────────────── */
  .editorial{ font-family:var(--serif); font-weight:400; letter-spacing:-0.005em; line-height:1.0 }
  .display{ font-family:var(--serif); font-weight:400; letter-spacing:-0.01em; line-height:.98 }
  .mono{ font-family:var(--mono); letter-spacing:0; font-weight:400 }
  .micro{ font-family:var(--sans); font-size:10px; text-transform:uppercase; letter-spacing:.18em; color:var(--ink-3); font-weight:400 }
  .micro-ink{ font-family:var(--sans); font-size:10px; text-transform:uppercase; letter-spacing:.18em; color:var(--ink); font-weight:500 }
  .num{ font-family:var(--mono); font-variant-numeric:tabular-nums; font-weight:400 }

  /* ── Buttons ────────────────────────────────────────────────────── */
  .btn{
    appearance:none; border:0; background:var(--ink); color:var(--paper);
    font:500 11px/1 var(--sans); letter-spacing:.18em; text-transform:uppercase;
    height:54px; padding:0 22px; border-radius:0;
    display:inline-flex; align-items:center; justify-content:center; gap:10px;
    cursor:pointer; width:100%;
  }
  .btn .label{display:inline-flex; align-items:center; gap:8px}
  .btn .arrow{font-size:11px; letter-spacing:.14em}
  .btn:hover{ background:#000 }
  .btn-ghost{ background:transparent; color:var(--ink); border:1px solid var(--ink) }
  .btn-ghost:hover{ background:var(--ink); color:var(--paper) }
  .btn-quiet{ background:transparent; color:var(--ink-2); border:1px solid var(--rule-2) }
  .btn-quiet:hover{ background:var(--paper-2) }
  .btn-dark{ background:var(--ink); color:var(--paper) }
  .btn-sm{ height:42px; padding:0 18px; font-size:10px }
  .btn .between-content{ display:flex; align-items:center; justify-content:space-between; width:100%; gap:12px }

  .tap{ cursor:pointer; user-select:none }
  .tap:active{ transform:translateY(1px) }

  /* ── Photo placeholders (Swiss tonal blocks w/ mono caption) ────── */
  .ph.quiet .cap, .ph.quiet .corner{ display:none }
  .ph{
    position:relative; overflow:hidden;
    background:var(--paper-2);
    background-image:
      linear-gradient(var(--paper-3) 1px, transparent 1px),
      linear-gradient(90deg, var(--paper-3) 1px, transparent 1px);
    background-size:24px 24px;
    color:var(--ink-3);
  }
  .ph.dk{ background:var(--ink); color:var(--ink-4); background-image:
      linear-gradient(#1f1e1a 1px, transparent 1px),
      linear-gradient(90deg, #1f1e1a 1px, transparent 1px);}
  .ph .cap{
    position:absolute; left:8px; top:8px; right:8px;
    font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase;
    color:inherit; opacity:.85;
    display:flex; justify-content:space-between; gap:8px;
    pointer-events:none;
  }
  .ph .cap b{ font-weight:500 }
  .ph .corner{
    position:absolute; bottom:8px; right:10px;
    font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase;
    opacity:.7;
  }
  .ph::after{
    /* subtle diagonal stripe to read as "image slot" */
    content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(135deg, transparent 0 14px, rgba(17,17,15,.025) 14px 15px);
    pointer-events:none;
  }
  .ph.dk::after{ background:repeating-linear-gradient(135deg, transparent 0 14px, rgba(255,255,255,.035) 14px 15px) }

  /* hairline rules */
  .rule{ height:1px; background:var(--rule); width:100% }

  /* chips */
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    height:34px; padding:0 16px; border:1px solid var(--rule-2);
    font:400 11px/1 var(--sans); letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink-2); background:transparent; cursor:pointer; white-space:nowrap;
    border-radius:0;
  }
  .chip.on{ background:var(--ink); color:var(--paper); border-color:var(--ink) }
  .chip:hover:not(.on){ background:var(--paper-2) }

  /* badges */
  .b2{
    display:inline-flex;align-items:center;gap:4px;
    font:500 9px/1 var(--sans); letter-spacing:.18em; text-transform:uppercase;
    padding:5px 10px; border-radius:0; border:1px solid currentColor;
    background:transparent; color:var(--ink-2);
  }
  .b2.accent{ color:var(--accent) }
  .b2.ok{ color:var(--ok) }
  .b2.warn{ color:var(--warn) }
  .b2.err{ color:var(--err) }
  .b2.solid{ background:var(--ink); color:var(--paper); border-color:var(--ink) }
  .b2.dark{ background:var(--ink); color:var(--paper); border-color:var(--ink) }

  /* topbar */
  .topbar{
    position:sticky; top:0; z-index:5;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 20px 16px; background:var(--paper);
  }
  .topbar.flush{ border-bottom:0 }
  .topbar .ttl{ display:flex; flex-direction:column; line-height:1; gap:4px }
  .icon-btn{
    width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;
    border:1px solid var(--rule-2); background:transparent; cursor:pointer; border-radius:0;
    color:var(--ink); font-size:14px;
  }
  .icon-btn:hover{ background:var(--paper-2) }
  .icon-btn svg{ width:16px; height:16px; stroke-width:1.5 }

  /* number stepper */
  .stepper{ display:inline-flex; align-items:center; background:transparent; height:42px; padding:0; border:1px solid var(--rule-2) }
  .stepper button{ appearance:none; border:0; background:transparent; width:42px; height:40px; cursor:pointer; font:400 16px/1 var(--sans); color:var(--ink); border-radius:0 }
  .stepper button:hover{ background:var(--paper-2) }
  .stepper button:disabled{ color:var(--ink-4); cursor:not-allowed }
  .stepper .v{ min-width:32px; text-align:center; font:400 13px/1 var(--mono); color:var(--ink) }

  /* sticky bottom action */
  .sticky-bot{
    position:sticky; bottom:0; z-index:6;
    padding:18px 20px 22px; background:var(--paper); border-top:1px solid var(--rule);
  }

  /* sheet (bottom modal) */
  .sheet-bg{ position:absolute; inset:0; background:rgba(17,17,15,.4); z-index:20; animation:fadein .18s ease }
  .sheet{
    position:absolute; left:0; right:0; bottom:0; z-index:21;
    background:var(--paper);
    border-top-left-radius:18px; border-top-right-radius:18px;
    max-height:90%; display:flex; flex-direction:column; overflow:hidden;
    animation:slideup .26s cubic-bezier(.2,.7,.2,1);
  }
  .sheet .grab{ width:36px; height:4px; background:var(--rule-2); border-radius:2px; margin:10px auto 0 }
  @keyframes slideup{ from{transform:translateY(20%); opacity:.5} to{transform:translateY(0); opacity:1} }
  @keyframes fadein{ from{opacity:0} to{opacity:1} }

  /* toast */
  .toast{
    position:absolute; left:50%; bottom:90px; transform:translateX(-50%);
    background:var(--ink); color:var(--paper); padding:10px 14px;
    font:500 11px/1 var(--mono); letter-spacing:.08em; text-transform:uppercase;
    z-index:30; box-shadow:0 10px 30px rgba(0,0,0,.3);
    animation:fadein .15s ease;
  }

  /* nav */
  .tabbar{
    flex:0 0 auto;
    display:grid; grid-template-columns:repeat(4,1fr);
    background:var(--paper); padding:12px 6px 16px; align-items:end;
    border-top:1px solid var(--rule);
  }
  .tabbar button{
    appearance:none;border:0;background:transparent;cursor:pointer;
    padding:8px 4px 4px; display:flex;flex-direction:column;align-items:center;gap:6px;
    color:var(--ink-3);
    font:400 9px/1 var(--sans); letter-spacing:.18em; text-transform:uppercase;
  }
  .tabbar button.on{ color:var(--ink) }
  .tabbar svg{ width:18px;height:18px;display:block; stroke-width:1.4 }
  .tabbar .scan{
    width:46px;height:46px;border-radius:0;background:var(--ink); color:var(--paper);
    margin-top:-12px;
  }
  .tabbar .scan svg{ width:18px; height:18px }

  /* link */
  .lnk{ color:var(--ink); text-decoration:underline; text-underline-offset:3px; cursor:pointer }
  .lnk:hover{ color:var(--accent) }

  /* skeleton */
  .skel{ background:linear-gradient(90deg, var(--paper-2) 0%, var(--paper-3) 50%, var(--paper-2) 100%); background-size:200% 100%; animation:shimmer 1.2s infinite linear }
  @keyframes shimmer{ 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* fade transitions for screen swap */
  .screen-fade{ animation:screenIn .26s ease both }
  @keyframes screenIn{ from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none} }

  /* ── Masonry (Pinterest-style) ──────────────────────────────────── */
  .masonry{ column-count:2; column-gap:10px; }
  .masonry > *{ break-inside:avoid; margin:0 0 10px }

  /* category tile */
  .cat{
    position:relative; display:block; cursor:pointer;
    background:var(--paper-2);
    overflow:hidden;
    border-radius:0;
  }
  .cat .meta{
    position:absolute; left:0; right:0; bottom:0;
    padding:16px 18px 18px;
    background:linear-gradient(to top, rgba(10,8,5,.7) 0%, rgba(10,8,5,.2) 60%, transparent);
    color:var(--paper);
  }
  .cat .meta .ttl{ font-family:var(--serif); font-size:26px; line-height:1; letter-spacing:-0.005em }
  .cat .meta .sub{ font-family:var(--sans); font-size:9.5px; letter-spacing:.18em; text-transform:uppercase; opacity:.7; margin-top:6px }

  /* item card */
  .icard{ display:block; background:transparent; border-radius:0; position:relative; overflow:hidden }
  .icard .body{ padding:14px 2px 12px; display:flex; flex-direction:column; gap:8px }
  .icard .nm{ font-family:var(--serif); font-size:20px; line-height:1.1; letter-spacing:-0.005em }
  .icard .ds{ font-size:11.5px; color:var(--ink-3); line-height:1.4 }
  .icard .ft{ display:flex; align-items:center; justify-content:space-between; margin-top:2px; gap:6px }
  .icard .pr{ font-family:var(--sans); font-size:12px; color:var(--ink); letter-spacing:.04em }
  .icard .add{
    appearance:none; border:1px solid var(--ink); background:transparent;
    width:30px; height:30px; cursor:pointer; color:var(--ink);
    font-size:14px; line-height:1; border-radius:0;
    display:inline-flex; align-items:center; justify-content:center;
  }
  .icard .add:hover{ background:var(--ink); color:var(--paper) }
  .icard.unav{ opacity:.55 }
  .icard.unav .add{ pointer-events:none; border-color:var(--rule); color:var(--ink-4) }

  /* small dietary marks */
  .diet{
    display:inline-flex; align-items:center; justify-content:center;
    width:14px; height:14px; border:1px solid currentColor; border-radius:1px;
    font:600 8px/1 var(--mono); letter-spacing:0;
  }
  .diet.veg{ color:#2f6b2f }
  .diet.nv{ color:#962d2d }
  .diet.jain{ color:#a4844b }
  .diet.vgn{ color:#2f6b2f }

  /* timeline */
  .tl{ display:flex; flex-direction:column; }
  .tl .step{ display:grid; grid-template-columns:32px 1fr; gap:14px; padding:10px 0; align-items:flex-start }
  .tl .dotwrap{ position:relative; display:flex; justify-content:center; }
  .tl .dot{ width:12px; height:12px; border:1px solid var(--ink); border-radius:50%; background:var(--paper); margin-top:4px; z-index:1 }
  .tl .step.done .dot{ background:var(--ink) }
  .tl .step.cur .dot{ background:var(--ink); box-shadow:0 0 0 4px rgba(17,17,15,.08) }
  .tl .step .line{ position:absolute; left:50%; top:0; bottom:-10px; width:1px; background:var(--rule); transform:translateX(-50%); z-index:0 }
  .tl .step:last-child .line{ display:none }
  .tl .lbl{ font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink) }
  .tl .step:not(.done):not(.cur) .lbl{ color:var(--ink-4) }
  .tl .ts{ font-family:var(--mono); font-size:10px; color:var(--ink-3); margin-top:2px }

  /* AI message */
  .ai-msg{ padding:14px 16px; border:1px solid var(--rule); background:transparent; border-radius:0 }
  .ai-msg.user{ background:var(--ink); color:var(--paper); border-color:var(--ink); margin-left:36px }
  .ai-msg.bot{ margin-right:36px }
  .ai-msg .who{ font-family:var(--sans); font-size:9.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-3); margin-bottom:6px }
  .ai-msg.user .who{ color:rgba(244,241,234,.5) }
  .ai-msg p{ margin:0; font-size:14px; line-height:1.55; font-family:var(--serif) }

  .ai-rec{ display:flex; gap:14px; padding:12px; background:transparent; align-items:stretch; border:1px solid var(--rule); border-radius:0; overflow:hidden }
  .ai-rec .ph{ width:74px; flex:0 0 74px; aspect-ratio:1/1; border-radius:0; overflow:hidden }
  .ai-rec .body{ flex:1; min-width:0; display:flex; flex-direction:column; justify-content:space-between; gap:4px }

  /* fab */
  .fab{ display:none }

  /* search input */
  .search{
    display:flex; align-items:center; gap:10px;
    background:transparent; border-radius:0; border:1px solid var(--rule-2);
    height:48px; padding:0 16px;
  }
  .search input{
    flex:1; border:0; outline:0; background:transparent;
    font:400 13px/1 var(--sans); color:var(--ink); letter-spacing:.02em;
  }
  .search input::placeholder{ color:var(--ink-4) }
  .search .k{ font:400 10px/1 var(--mono); color:var(--ink-4); letter-spacing:.14em }

  /* segmented */
  .seg{ display:flex; background:transparent; padding:0; gap:0; border:1px solid var(--rule-2); border-radius:0 }
  .seg button{
    flex:1; appearance:none; border:0; background:transparent;
    height:42px; cursor:pointer; font:500 10px/1 var(--sans); letter-spacing:.16em; text-transform:uppercase; color:var(--ink-2); border-radius:0;
  }
  .seg button.on{ background:var(--ink); color:var(--paper) }

  /* radio row (payment etc) */
  .rrow{
    display:flex; align-items:center; gap:14px;
    padding:18px 0; background:transparent; cursor:pointer; border-radius:0; margin-bottom:0;
    border-bottom:1px solid var(--rule);
  }
  .rrow .rd{ width:16px;height:16px;border:1px solid var(--ink-3); border-radius:50%; flex:0 0 16px; position:relative }
  .rrow.on .rd{ border-color:var(--ink) }
  .rrow.on .rd::after{ content:""; position:absolute; inset:3px; background:var(--ink); border-radius:50% }
  .rrow .ttl{ font:400 17px/1.2 var(--serif); color:var(--ink) }
  .rrow .sub{ font:400 11px/1.4 var(--sans); color:var(--ink-3); margin-top:4px; letter-spacing:.04em }
  .rrow .meta{ font-size:10px; color:var(--ink-3); font-weight:400; letter-spacing:.16em; text-transform:uppercase }

  /* checkboxes */
  .cb{ width:18px;height:18px; border:1px solid var(--ink-3); display:inline-flex; align-items:center; justify-content:center; cursor:pointer; flex:0 0 18px; border-radius:0 }
  .cb.on{ background:var(--ink); color:var(--paper); border-color:var(--ink) }
  .cb svg{ width:12px;height:12px }

  /* stars */
  .stars{ display:inline-flex; gap:6px }
  .star{ width:34px;height:34px; cursor:pointer; color:var(--rule-2) }
  .star.on{ color:var(--ink) }
  .star svg{ width:100%;height:100% }

  /* whatsapp icon hint */
  .wa{ width:18px; height:18px; border:1px solid var(--ok); color:var(--ok); display:inline-flex; align-items:center; justify-content:center; font:600 9px/1 var(--mono); border-radius:50% }

  /* form input */
  .input{
    width:100%; height:48px; padding:0 16px; border:1px solid var(--rule-2); background:transparent; border-radius:0;
    font:400 13px/1 var(--sans); color:var(--ink); outline:0; letter-spacing:.02em;
  }
  .input:focus{ border-color:var(--ink) }
  textarea.input{ height:auto; padding:12px 14px; min-height:80px; resize:vertical; line-height:1.5 }
  .field{ display:flex; flex-direction:column; gap:8px }
  .field label{ font:500 10px/1 var(--sans); letter-spacing:.18em; text-transform:uppercase; color:var(--ink-3) }

  /* Dark mode for stage */
  .stage.dark{ --paper:#11110f; --paper-2:#1c1b18; --paper-3:#26241f; --ink:#f4f1ea; --ink-2:#cdc7b8; --ink-3:#9a978c; --ink-4:#6b685f; --rule:#26241f; --rule-2:#3a3934; --accent:#caa666 }
  .stage.dark .ph{ background:#1c1b18; color:#6b685f; background-image:linear-gradient(#26241f 1px, transparent 1px), linear-gradient(90deg, #26241f 1px, transparent 1px) }
  .stage.dark .ph::after{ background:repeating-linear-gradient(135deg, transparent 0 14px, rgba(255,255,255,.025) 14px 15px) }
  .stage.dark .btn{ background:var(--ink); color:var(--paper) }
  .stage.dark .btn:hover{ background:#fff }

  /* utility */
  .hstack{ display:flex; align-items:center; gap:10px }
  .vstack{ display:flex; flex-direction:column; gap:10px }
  .between{ display:flex; align-items:center; justify-content:space-between; gap:10px }
  .pad{ padding:18px }
  .pad-x{ padding-left:18px; padding-right:18px }

  /* Ledger row */
  .ledger{ display:flex; flex-direction:column; }
  .ledger .row{ display:flex; align-items:baseline; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--rule); }
  .ledger .row:last-child{ border-bottom:0; padding-top:18px; padding-bottom:0 }
  .ledger .row .l{ color:var(--ink-3); font:400 10px/1 var(--sans); letter-spacing:.18em; text-transform:uppercase }
  .ledger .row .v{ font-family:var(--mono); color:var(--ink); font-size:13px }
  .ledger .row.total .l, .ledger .row.total .v{ color:var(--ink); font-size:15px; font-family:var(--serif); letter-spacing:.04em; text-transform:none }

  /* Tweaks panel font override (it ships its own) */
  .twk-panel{ font-family:var(--sans) !important }

  /* Ph2 ribbon for category card  */
  .ribbon{
    position:absolute; top:10px; left:10px; z-index:2;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

// ─────────────────────────────────────────────────────────────────────────────
// 3. MENU (search + filters + masonry of items)
// ─────────────────────────────────────────────────────────────────────────────
function Menu({ go, initialCat, openAI }){
  const [tab, setTab] = useS(initialCat || "dining");
  const [q, setQ] = useS("");
  const [filters, setFilters] = useS([]);

  const cats = window.CATS.filter(c=>!c.ph2 || c.id==="bfast" /* allow */);

  const items = useM(()=>{
    let a = window.ITEMS.filter(i=>i.cat===tab);
    if(q) a = a.filter(i=> (i.n + " " + i.d).toLowerCase().includes(q.toLowerCase()));
    if(filters.includes("pop")) a = a.filter(i=>i.pop);
    if(filters.includes("veg")) a = a.filter(i=>i.diet.includes("veg") || i.diet.includes("vgn"));
    if(filters.includes("jain")) a = a.filter(i=>i.diet.includes("jain"));
    if(filters.includes("vgn")) a = a.filter(i=>i.diet.includes("vgn"));
    if(filters.includes("quick")) a = a.filter(i=>i.quick);
    if(filters.includes("u500")) a = a.filter(i=>i.p>0 && i.p<500);
    return a;
  }, [tab,q,filters]);

  const toggle = (k)=> setFilters(f => f.includes(k) ? f.filter(x=>x!==k) : [...f,k]);

  return (
    <div className="screen screen-fade" data-screen-label="Menu">
      <StatusBar/>
      <TopBar onBack={()=>go("home")} sub="Menu" title={cats.find(c=>c.id===tab)?.t || "Browse"} right={
        <button className="icon-btn" onClick={()=>go("cart")}>{Ic.cart}</button>
      }/>

      {/* Category strip */}
      <div style={{display:"flex", gap:6, padding:"4px 18px 12px", overflowX:"auto", scrollbarWidth:"none", background:"var(--paper)", flex:"0 0 auto"}}>
        {cats.map(c => (
          <button key={c.id} className={"chip " + (tab===c.id?"on":"")} onClick={()=>setTab(c.id)}>{c.t}</button>
        ))}
      </div>

        <div className="scroll">
          {/* Filters available via search; hidden by default for cleaner browse */}

        <div style={{padding:"4px 18px 96px"}}>
          <div className="masonry">
            {items.map((it, i)=>(
              <div key={it.id} className={"icard tap " + (it.unav?"unav":"")} onClick={()=>!it.unav && go("item", {id:it.id})}>
                {(()=>{ const ii = imgForItem(it); return <ImgTile kind={ii.kind} color={ii.color} h={Math.max(140, it.h*0.62)}/>; })()}
                {it.unav ? <span className="ribbon" style={{background:"var(--ink)", color:"var(--paper)", borderColor:"var(--ink)"}}>Sold out</span> : null}
                <div className="body">
                  <div className="nm">{it.n}</div>
                  <div className="ft">
                    <span className="pr">{fmt(it.p, "INR")}</span>
                    <button className="add" onClick={(e)=>{e.stopPropagation(); !it.unav && go("item", {id:it.id})}}>+</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
          {items.length===0 ? (
            <div style={{textAlign:"center", padding:"40px 20px"}}>
              <div className="editorial" style={{fontSize:24, marginBottom:8}}>Nothing matches.</div>
              <p style={{color:"var(--ink-3)", fontSize:13, margin:"0 0 14px"}}>Try fewer filters, or ask the AI concierge for a recommendation.</p>
              <button className="btn btn-ghost" style={{maxWidth:240, margin:"0 auto"}} onClick={openAI}>
                <span className="label">Ask the concierge</span><span className="arrow">→</span>
              </button>
            </div>
          ) : null}
        </div>
      </div>

      {/* AI FAB */}
      <button className="fab" onClick={openAI} aria-label="Ask AI">
        <span className="pulse"></span>
        <em style={{fontStyle:"italic"}}>ai</em>
      </button>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// 5. CART
// ─────────────────────────────────────────────────────────────────────────────
function Cart({ go, cart, setCart }){
  const subtotal = cart.reduce((s,c)=>s+c.total, 0);
  const tax = Math.round(subtotal*0.05);
  const service = Math.round(subtotal*0.10);
  const [tipPct, setTipPct] = useS(0);
  const [editingNote, setEditingNote] = useS(null);
  const tip = Math.round(subtotal * tipPct / 100);
  const total = subtotal+tax+service+tip;

  // Estimated arrival based on slowest prep time
  const maxPrep = cart.reduce((m,c)=>{
    const n = parseInt(c.it.prep) || 20;
    return Math.max(m, n);
  }, 22);
  const eta = `${maxPrep} – ${maxPrep+6} minutes`;

  const upsell = window.ITEMS.filter(i=>i.cat==="des" || i.cat==="bev").slice(0,3);

  const setQty = (idx, q)=>{
    setCart(cart.map((c,i)=>{
      if(i!==idx) return c;
      const unit = c.total/c.qty;
      return {...c, qty:q, total: unit*q};
    }));
  };
  const setNote = (idx, note)=>{
    setCart(cart.map((c,i)=> i===idx ? {...c, note} : c));
  };
  const remove = (idx)=> setCart(cart.filter((_,i)=>i!==idx));

  if(cart.length===0){
    return (
      <div className="screen screen-fade" data-screen-label="Cart">
        <StatusBar/>
        <TopBar onBack={()=>go(-1)} title="Your order"/>
        <div style={{flex:1, display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", padding:40, textAlign:"center"}}>
          <div className="micro" style={{marginBottom:18, color:"var(--accent)"}}>The cart</div>
          <div className="editorial" style={{fontSize:34, lineHeight:1.05, maxWidth:"14ch", letterSpacing:"-0.01em"}}>Nothing here <i>yet.</i></div>
          <p style={{color:"var(--ink-3)", maxWidth:"32ch", margin:"16px 0 28px", fontSize:14, lineHeight:1.55, fontFamily:"var(--serif)", fontStyle:"italic"}}>Browse the menu, choose a few favourites — we'll see them safely up to your room.</p>
          <button className="btn" style={{maxWidth:280}} onClick={()=>go("menu")}>
            <span className="label">Browse the menu</span>
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="screen screen-fade" data-screen-label="Cart">
      <StatusBar/>
      <TopBar onBack={()=>go(-1)} title="Your order" sub={cart.length + " " + (cart.length===1?"item":"items")}/>
      <div className="scroll">
        {/* Estimated arrival header */}
        <div className="pad" style={{paddingBottom:8}}>
          <div className="between" style={{padding:"14px 16px", border:"1px solid var(--rule)"}}>
            <div>
              <div className="micro" style={{marginBottom:6}}>Estimated arrival</div>
              <div className="editorial" style={{fontSize:20, lineHeight:1}}>{eta}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div className="micro" style={{marginBottom:6}}>To</div>
              <div className="editorial" style={{fontSize:20, lineHeight:1}}>Room 1208</div>
            </div>
          </div>
        </div>

        <div className="pad" style={{paddingTop:14}}>
          {cart.map((c,i)=>(
            <div key={i} style={{display:"flex", gap:14, padding:"18px 0", borderBottom:"1px solid var(--rule)"}}>
              {(()=>{ const ii = imgForItem(c.it); return <ImgTile kind={ii.kind} color={ii.color} h={90} style={{width:90, flex:"0 0 90px"}}/>; })()}
              <div style={{flex:1, minWidth:0}}>
                <div className="editorial" style={{fontSize:18, lineHeight:1.1, marginBottom:6}}>{c.it.n}</div>
                <div className="num" style={{fontSize:12, color:"var(--ink-3)", letterSpacing:".04em", marginBottom:8}}>{fmt(c.total/c.qty, "INR")} · {c.it.prep}</div>

                {editingNote === i ? (
                  <textarea autoFocus className="input" placeholder="Note for the kitchen…" value={c.note||""}
                    onChange={e=>setNote(i, e.target.value)}
                    onBlur={()=>setEditingNote(null)}
                    style={{fontFamily:"var(--serif)", fontStyle:"italic", fontSize:13, minHeight:54, padding:"10px 12px", marginBottom:8}}/>
                ) : c.note ? (
                  <div className="tap" onClick={()=>setEditingNote(i)} style={{margin:"0 0 8px", fontFamily:"var(--serif)", fontStyle:"italic", fontSize:13, color:"var(--ink-2)", lineHeight:1.4, paddingLeft:10, borderLeft:"1px solid var(--rule-2)"}}>
                    "{c.note}"
                  </div>
                ) : null}

                <div className="between" style={{marginTop:8}}>
                  <Stepper value={c.qty} onChange={(q)=>setQty(i,q)}/>
                  <div className="hstack" style={{gap:14}}>
                    {!c.note && editingNote !== i ? (
                      <button onClick={()=>setEditingNote(i)} style={{appearance:"none", border:0, background:"transparent", cursor:"pointer", padding:0, font:"400 9px/1 var(--sans)", letterSpacing:".18em", textTransform:"uppercase", color:"var(--ink-3)"}}>+ Note</button>
                    ) : null}
                    <button onClick={()=>remove(i)} style={{appearance:"none", border:0, background:"transparent", cursor:"pointer", padding:0, font:"400 9px/1 var(--sans)", letterSpacing:".18em", textTransform:"uppercase", color:"var(--ink-3)"}}>Remove</button>
                  </div>
                </div>
              </div>
              <div className="num" style={{fontSize:14, color:"var(--ink)", letterSpacing:".04em", whiteSpace:"nowrap"}}>{fmt(c.total, "INR")}</div>
            </div>
          ))}
        </div>

        {/* Gratuity */}
        <div className="pad" style={{paddingTop:8, paddingBottom:8}}>
          <div className="between" style={{marginBottom:12}}>
            <span className="micro">Gratuity</span>
            <span className="micro" style={{color:"var(--ink-4)"}}>For the brigade</span>
          </div>
          <div className="seg">
            {[0,10,15,20].map(p=>(
              <button key={p} className={tipPct===p?"on":""} onClick={()=>setTipPct(p)}>{p===0?"None":p+"%"}</button>
            ))}
          </div>
        </div>

        {/* Upsell */}
        <div style={{padding:"14px 18px 12px"}}>
          <div className="micro" style={{marginBottom:14}}>You may also like</div>
          <div style={{display:"flex", gap:10, overflowX:"auto", scrollbarWidth:"none"}}>
            {upsell.map(it=>(
              <div key={it.id} className="tap" onClick={()=>go("item", {id:it.id})} style={{flex:"0 0 160px"}}>
                {(()=>{ const ii = imgForItem(it); return <ImgTile kind={ii.kind} color={ii.color} h={110}/>; })()}
                <div style={{padding:"10px 0 0"}}>
                  <div className="editorial" style={{fontSize:15, lineHeight:1.1}}>{it.n}</div>
                  <div className="num" style={{fontSize:11, marginTop:4, letterSpacing:".04em", color:"var(--ink-3)"}}>{fmt(it.p, "INR")}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Ledger */}
        <div className="pad" style={{paddingTop:18}}>
          <div className="micro" style={{marginBottom:10}}>Summary</div>
          <div className="ledger">
            <div className="row"><span className="l">Subtotal</span><span className="v">{fmt(subtotal,"INR")}</span></div>
            <div className="row"><span className="l">GST · 5%</span><span className="v">{fmt(tax,"INR")}</span></div>
            <div className="row"><span className="l">Service · 10%</span><span className="v">{fmt(service,"INR")}</span></div>
            {tip>0 ? <div className="row"><span className="l">Gratuity · {tipPct}%</span><span className="v">{fmt(tip,"INR")}</span></div> : null}

        </div>
        <div style={{height:90}}></div>
      </div>

      <div className="sticky-bot">
        <button className="btn" onClick={()=>go("checkout")}>
          <span className="label">Continue</span>
          <span className="arrow">— {fmt(total, "INR")}</span>

function AIConcierge({ onClose, onAddToCart, go }){
  const [msgs, setMsgs] = useS([
    { who:"bot", text: window.AI_REPLY.greeting }
  ]);
  const [input, setInput] = useS("");
  const scrollRef = useR(null);

  useE(()=>{
    if(scrollRef.current){
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  },[msgs]);

  const reply = (q)=>{
    const lq = q.toLowerCase();
    let r = null;
    if(lq.includes("vegetarian") || lq.includes("veg")) r = window.AI_REPLY.veg;
    else if(lq.includes("500") || lq.includes("under")) r = window.AI_REPLY.under500;
    else if(lq.includes("light") || lq.includes("healthy")) r = window.AI_REPLY.light;
    else r = { text:"A few I'd recommend right now — say the word and I'll add any of them.", items:["i1","i3","f3"] };
    return r;
  };

  const send = (q)=>{
    setMsgs(m => [...m, { who:"user", text:q }]);
    setInput("");
    setTimeout(()=>{
      const r = reply(q);
      setMsgs(m => [...m, { who:"bot", text:r.text, recs: r.items }]);
    }, 700);
  };

  return (
    <div className="screen screen-fade" data-screen-label="AI Concierge" style={{background:"var(--paper)"}}>

              <div style={{marginTop:10, marginRight:36, display:"flex", flexDirection:"column", gap:8}}>
                {m.recs.map(rid=>{
                  const it = window.ITEMS.find(x=>x.id===rid);

                  return (
                    <div key={rid} className="ai-rec">
                      {(()=>{ const ii = imgForItem(it); return <ImgTile kind={ii.kind} color={ii.color} h={74} style={{width:74, flex:"0 0 74px"}}/>; })()}

                        </div>
                        <div className="between">
                          <span className="num" style={{fontSize:12}}>{fmt(it.p,"INR")} · {it.prep}</span>
                          <button className="add" style={{width:26, height:26, fontSize:14}} onClick={()=>{
                            onAddToCart(it,{qty:1,size:"regular",spice:"medium",extras:[],note:"",total:it.p});

        <div className="search">
          <span style={{color:"var(--ink-3)", fontFamily:"var(--serif)", fontStyle:"italic", fontSize:14}}>ai</span>
          <input placeholder="Ask the concierge anything…" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter" && input.trim()) send(input.trim()) }}/>
          <button className="icon-btn" style={{width:30, height:30}} onClick={()=>input.trim() && send(input.trim())}>→</button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// 11. SCHEDULE (Phase 2 — breakfast pre-order)
// ─────────────────────────────────────────────────────────────────────────────
function Schedule({ go, onSchedule }){
  const [type, setType] = useS("schedule");
  const [date, setDate] = useS("tomorrow");
  const [slot, setSlot] = useS("0700");
  const [combo, setCombo] = useS("continental");

  const slots = ["0630","0700","0730","0800","0830","0900","0930","1000","1030"];
  const combos = [
    { id:"continental", t:"The continental",   s:"Viennoiserie · fruit · juice · coffee", p:1200, ph:"TRAY / MORNING" },
    { id:"madras",      t:"South Indian",       s:"Idli · dosa · vada · filter coffee",   p:840,  ph:"DOSA / TOP" },
    { id:"english",     t:"Full English",       s:"Eggs · sausage · beans · toast",        p:1450, ph:"PLATE / EGGS" },
    { id:"asian",       t:"Asian congee bowl",  s:"Rice porridge · pickles · tea",         p:780,  ph:"BOWL / WHITE" },
  ];

  return (
    <div className="screen screen-fade" data-screen-label="Schedule">
      <StatusBar/>
      <TopBar onBack={()=>go(-1)} title="Schedule" sub="Pre-order"/>
      <div className="scroll">
        <div className="pad">
          <div className="editorial" style={{fontSize:32, lineHeight:1, letterSpacing:"-0.01em", margin:"4px 0 16px", maxWidth:"18ch"}}>Breakfast, exactly when you want it.</div>
          <p style={{color:"var(--ink-3)", fontSize:13, lineHeight:1.55, margin:"0 0 22px", maxWidth:"36ch"}}>Choose a time and a combo. We'll have it on the floor at your door, freshly plated.</p>

          <div className="between" style={{marginBottom:10}}>
            <span className="micro-ink">When</span>
          </div>
          <div className="seg" style={{marginBottom:14}}>
            <button className={type==="asap"?"on":""} onClick={()=>setType("asap")}>Now</button>
            <button className={type==="schedule"?"on":""} onClick={()=>setType("schedule")}>Schedule</button>
          </div>

          {type==="schedule" ? (
            <>
              <div className="micro" style={{marginBottom:8}}>Date</div>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6, marginBottom:18}}>
                {[
                  {k:"today", t:"Today", d:"7 May", dis:true},
                  {k:"tomorrow", t:"Tomorrow", d:"8 May"},
                  {k:"sat", t:"Saturday", d:"9 May"},
                ].map(o=>(
                  <button key={o.k} disabled={o.dis} className={"chip " + (date===o.k?"on":"")} style={{height:60, flexDirection:"column", gap:4, padding:"10px 6px", opacity:o.dis?.4:1, borderRadius:0}}>}} onClick={()=>!o.dis && setDate(o.k)}>
                    <span style={{fontSize:9.5}}>{o.t}</span>
                    <span style={{fontFamily:"var(--mono)", fontSize:11}}>{o.d}</span>
                  </button>
                ))}
              </div>

              <div className="between" style={{marginBottom:8}}>
                <span className="micro">Time</span>
                <span className="micro" style={{color:"var(--warn)"}}>Cutoff 02:00</span>
              </div>
              <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:6, marginBottom:24}}>
                {slots.map(s=>(
                  <button key={s} className={"chip " + (slot===s?"on":"")} style={{height:46, fontSize:12, borderRadius:0}} onClick={()=>setSlot(s)}>
                    {s.slice(0,2)}:{s.slice(2)}
                  </button>
                ))}
              </div>
            </>
          ) : null}

          <div className="rule" style={{margin:"6px 0 18px"}}></div>

          <div className="micro-ink" style={{marginBottom:10}}>Choose a combo</div>
          <div style={{display:"flex", flexDirection:"column", gap:8}}>
            {combos.map(c=>(
              <div key={c.id} className={"rrow tap " + (combo===c.id?"on":"")} onClick={()=>setCombo(c.id)} style={{padding:"10px 0", gap:12}}>
                <span className="rd"></span>
                <ImgTile kind={{continental:"tray", madras:"dosa", english:"toast", asian:"bowl"}[c.id] || "tray"} color={["ochre","sage","terra","plum"][combos.findIndex(x=>x.id===c.id)%4]} h={50} style={{width:50, flex:"0 0 50px"}}/>
                <div style={{flex:1}}>
                  <div className="ttl">{c.t}</div>
                  <div className="sub">{c.s}</div>
                </div>
                <span className="num" style={{fontSize:12}}>{fmt(c.p,"INR")}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{height:90}}></div>
      </div>
      <div className="sticky-bot">
        <button className="btn" onClick={()=>onSchedule({type,date,slot,combo})}>
          <span className="label">Confirm pre-order</span>
          <span className="arrow">{type==="schedule" ? `${slot.slice(0,2)}:${slot.slice(2)} →` : "→"}</span>
        </button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// 12. STAY / Account (small)
// ─────────────────────────────────────────────────────────────────────────────
function Stay({ go, hotel }){
  return (
    <div className="screen screen-fade" data-screen-label="Stay">
      <StatusBar/>
      <TopBar title="Your stay" sub={"Room " + hotel.room}/>
      <div className="scroll">
        <div className="pad">
          <div className="editorial" style={{fontSize:34, lineHeight:1, margin:"4px 0 18px", letterSpacing:"-0.015em", maxWidth:"14ch"}}>Welcome, <i>{hotel.guest}.</i></div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", background:"transparent", border:"1px solid var(--rule)", marginBottom:18}}>
            <div style={{padding:"16px", borderRight:"1px solid var(--rule)"}}>
              <div className="micro" style={{marginBottom:6}}>Check-out</div>
              <div className="num" style={{fontSize:16, fontWeight:500}}>9 May · 12:00</div>
            </div>
            <div style={{padding:"14px"}}>
              <div className="micro" style={{marginBottom:6}}>Folio</div>
              <div className="num" style={{fontSize:16, fontWeight:500}}>₹14,820</div>
            </div>
          </div>

          <div className="micro-ink" style={{marginBottom:10}}>Past orders</div>
          {[{n:"#VRP4810", t:"Truffle linguine + Old fashioned", a:"₹2,300", d:"Yesterday"},
            {n:"#VRP4801", t:"The continental", a:"₹1,200", d:"Yesterday · 07:30"}].map(o=>(
            <div key={o.n} className="between" style={{padding:"14px 0", borderBottom:"1px solid var(--rule)"}}>
              <div>
                <div className="num" style={{fontSize:11, color:"var(--ink-3)", letterSpacing:".06em"}}>{o.n}</div>
                <div style={{fontSize:13.5, marginTop:3}}>{o.t}</div>
                <div className="micro" style={{marginTop:3}}>{o.d}</div>
              </div>
              <span className="num">{o.a}</span>
            </div>
          ))}

          <div className="rule" style={{margin:"22px 0"}}></div>
          <button className="btn btn-ghost" onClick={()=>go("feedback")}>
            <span className="label">Leave feedback on last order</span><span className="arrow">→</span>
          </button>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { QRLanding, Home, Menu, ItemDetail, Cart, Checkout, Payment, Tracking, Feedback, AIConcierge, Schedule, Stay });

</script>

<script type="text/babel" data-from="app.jsx">
// app.jsx — root navigation + tweaks

const { useState: uS, useEffect: uE, useMemo: uM } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "hotelName": "Servd",
  "guestName": "Ms. Patel",
  "room": "1208",
  "phase2": true,
  "dark": false,
  "showMixed": true,
  "currency": "INR"
}/*EDITMODE-END*/;

function App(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [stack, setStack] = uS([{ s:"qr" }]);
  const [tab, setTab] = uS("home");
  const [cart, setCart] = uS([]);
  const [toast, setToast] = uS("");
  const [aiOpen, setAiOpen] = uS(false);
  const [hasOrder, setHasOrder] = uS(false);

  const cur = stack[stack.length-1];

  const hotel = uM(()=>({
    name: t.hotelName, guest: t.guestName, room: t.room, loc:"Bandra West · 12 Floor"
  }), [t.hotelName, t.guestName, t.room]);

  const go = (s, params)=>{
    if(s === -1){ setStack(st => st.length>1 ? st.slice(0,-1) : st); return; }
    if(s === "feedback" || s === "track" || s === "schedule" || s === "checkout" || s === "payment" || s === "cart" || s === "menu" || s === "item" || s === "qr" || s === "home" || s === "stay") {
      setStack(st => [...st, { s, ...params }]);
      if(s==="home") setTab("home");
      if(s==="menu") setTab("menu");
      if(s==="track") setTab("orders");
      if(s==="stay") setTab("acct");
    }
  };

  const showToast = (m)=>{
    setToast(m);
    setTimeout(()=>setToast(""), 1600);
  };

  const addToCart = (it, opts)=>{
    setCart(c => [...c, { it, ...opts }]);
    showToast(`Added · ${it.n.split(",")[0]}`);
  };

  const placeOrder = ({pay, timing, total, wa})=>{
    setHasOrder(true);
    setCart([]);
    setStack(st => [...st, { s:"track" }]);
    setTab("orders");
  };

  const tabChange = (k)=>{
    setTab(k);
    if(k==="home") setStack([{s:"home"}]);
    if(k==="menu") setStack([{s:"menu"}]);
    if(k==="orders") setStack([{s:hasOrder?"track":"home"}]);
    if(k==="acct") setStack([{s:"stay"}]);
  };

  const cartTotal = cart.reduce((s,c)=>s+c.total, 0);

  // Render screen
  let screen;
  switch(cur.s){
    case "qr":       screen = <QRLanding go={go} hotel={hotel} currency={t.currency} onTrack={()=>{ setHasOrder(true); go("track"); }}/>; break;
    case "home":     screen = <Home go={go} hotel={hotel} openAI={()=>setAiOpen(true)} recentOrder={hasOrder}/>; break;
    case "menu":     screen = <Menu go={go} initialCat={cur.cat} openAI={()=>setAiOpen(true)}/>; break;
    case "item":     screen = <ItemDetail id={cur.id} go={go} onAdd={addToCart}/>; break;
    case "cart":     screen = <Cart go={go} cart={cart} setCart={setCart}/>; break;
    case "checkout": screen = <Checkout go={go} cart={cart} hotel={hotel} ph2={t.phase2} onPlace={placeOrder}/>; break;
    case "payment":  screen = <Payment go={go} total={cur.total} onSuccess={()=> placeOrder({pay:"now", timing:"asap", total:cur.total, wa:true}) }/>; break;
    case "track":    screen = <Tracking go={go} cart={cart} mixedDemo={t.showMixed} ph2={t.phase2}/>; break;
    case "feedback": screen = <Feedback go={go}/>; break;
    case "schedule": screen = <Schedule go={go} onSchedule={()=>{ showToast("Pre-order confirmed"); go("home"); }}/>; break;
    case "stay":     screen = <Stay go={go} hotel={hotel}/>; break;
    default: screen = <div className="pad">Not found</div>;
  }

  // Persistent CartButton on browse screens, FAB on a few
  const showTab = ["home","menu","track","stay"].includes(cur.s);
  const showCartFloat = cur.s !== "cart" && cur.s !== "checkout" && cur.s !== "payment" && cur.s !== "track" && cur.s !== "feedback" && cur.s !== "qr" && cart.length>0;

  return (
    <>
      <div className={"stage " + (t.dark?"dark":"")}>
        {screen}

        {/* Floating cart bar — visible on home, menu, item */}
        {showCartFloat ? (
          <div style={{position:"absolute", left:0, right:0, bottom: showTab ? 60 : 0, padding:10, background:"linear-gradient(to top, var(--paper) 60%, transparent)"}}>
            <button className="btn" onClick={()=>go("cart")}>
              <span className="label">
                <span className="num" style={{fontSize:10, opacity:.6, letterSpacing:".14em", textTransform:"uppercase"}}>Cart · {cart.length} {cart.length===1?"item":"items"}</span>
                <span style={{fontSize:14, fontWeight:500}}>View order</span>
              </span>
              <span className="num" style={{fontSize:13}}>{fmt(cartTotal, t.currency || "INR")} →</span>
            </button>
          </div>
        ) : null}

        {/* Tab bar on main destinations */}
        {showTab && cur.s !== "qr" ? (
          <TabBar active={tab} onChange={tabChange} cartCount={cart.length}/>
        ) : null}

        {/* AI concierge overlay */}
        {aiOpen && t.phase2 ? (
          <div style={{position:"absolute", inset:0, zIndex:25, background:"var(--paper)"}}>
            <AIConcierge onClose={()=>setAiOpen(false)} onAddToCart={(it,opts)=>{ addToCart(it,opts); }} go={go}/>
          </div>
        ) : null}

        <Toast msg={toast}/>
      </div>

      <TweaksPanel>
        <TweakSection label="Hotel"/>
        <TweakText label="Hotel name" value={t.hotelName} onChange={(v)=>setTweak("hotelName", v)}/>
        <TweakText label="Guest name" value={t.guestName} onChange={(v)=>setTweak("guestName", v)}/>
        <TweakText label="Room"       value={t.room}       onChange={(v)=>setTweak("room", v)}/>

        <TweakSection label="Phase 2 features"/>
        <TweakToggle label="Phase 2 enabled"        value={t.phase2}    onChange={(v)=>setTweak("phase2", v)}/>
        <TweakToggle label="Mixed-request tracking" value={t.showMixed} onChange={(v)=>setTweak("showMixed", v)}/>

        <TweakSection label="Display"/>
        <TweakToggle label="Dark mode" value={t.dark} onChange={(v)=>setTweak("dark", v)}/>
        <TweakSelect label="Currency"  value={t.currency} options={["INR","USD","EUR"]} onChange={(v)=>setTweak("currency", v)}/>

        <TweakSection label="Jump to screen"/>
        <TweakButton label="QR landing"      onClick={()=>setStack([{s:"qr"}])}/>
        <TweakButton label="Home"            onClick={()=>{setStack([{s:"home"}]); setTab("home");}}/>
        <TweakButton label="Menu"            onClick={()=>{setStack([{s:"menu"}]); setTab("menu");}}/>
        <TweakButton label="Item detail"     onClick={()=>setStack([{s:"home"},{s:"menu"},{s:"item", id:"i3"}])}/>
        <TweakButton label="Cart (with items)" onClick={()=>{
          if(cart.length===0){
            setCart([
              {it:window.ITEMS[0], qty:1, size:"regular", spice:"medium", extras:[], note:"", total:780},
              {it:window.ITEMS[2], qty:1, size:"regular", spice:"medium", extras:["truff"], note:"Vegetarian, please", total:1540},
            ]);
          }
          setStack([{s:"home"},{s:"cart"}]);
        }}/>
        <TweakButton label="Checkout"        onClick={()=>setStack([{s:"home"},{s:"cart"},{s:"checkout"}])}/>
        <TweakButton label="Payment"         onClick={()=>setStack([{s:"home"},{s:"cart"},{s:"checkout"},{s:"payment", total:3240}])}/>
        <TweakButton label="Tracking"        onClick={()=>{setHasOrder(true); setStack([{s:"track"}]); setTab("orders");}}/>
        <TweakButton label="Feedback"        onClick={()=>setStack([{s:"home"},{s:"feedback"}])}/>
        <TweakButton label="AI concierge"    onClick={()=>setAiOpen(true)}/>
        <TweakButton label="Schedule"        onClick={()=>setStack([{s:"home"},{s:"schedule"}])}/>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
