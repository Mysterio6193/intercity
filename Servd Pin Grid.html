<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>Servd · Pin Grid edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    /* ── Pin Grid edition · cream chrome + saffron accent ─────────── */
    /* Single saturated accent */
    --saffron:#E2541C;
    --saffron-pressed:#C8470F;
    --on-saffron:#ffffff;

    /* Ink */
    --ink:#000000;
    --ink-soft:#211922;
    --body:#33332e;
    --charcoal:#262622;
    --mute:#62625b;
    --ash:#91918c;
    --stone:#c8c8c1;
    --hairline:#dadad3;
    --hairline-soft:#e5e5e0;

    /* Surfaces — warm cream chrome */
    --canvas:#ffffff;
    --surface-soft:#fbfbf9;
    --surface-card:#f6f6f3;
    --surface-dark:#262622;
    --secondary-bg:#e5e5e0;
    --secondary-pressed:#c8c8c1;

    /* Semantic */
    --ok:#103c25;
    --ok-pale:#c7f0da;
    --warn:#8a5f20;
    --err:#9e0a0a;

    /* Focus */
    --focus:#435ee5;

    /* Backwards-compat aliases so older inline styles still resolve */
    --paper:var(--surface-soft);
    --paper-2:var(--surface-card);
    --paper-3:var(--secondary-bg);
    --ink-2:var(--body);
    --ink-3:var(--mute);
    --ink-4:var(--ash);
    --rule:var(--hairline);
    --rule-2:var(--hairline-soft);
    --accent:var(--saffron);
    --accent-2:var(--saffron);
    --accent-3:var(--ink);
    --accent-soft:#FBE7DA;
    --jade:var(--ok);
    --jade-soft:var(--ok-pale);
    --gold-grad:var(--saffron);
    --warm-grad:var(--ink);

    --terra:var(--saffron); --terra-bg:#FBE7DA;
    --sage:var(--ok); --sage-bg:var(--ok-pale);
    --plum:var(--ink); --plum-bg:var(--surface-card);
    --ochre:var(--warn); --ochre-bg:#F5E9CC;
    --teal:#1f4a5a; --teal-bg:#cde0e2;
    --ink-bg:var(--surface-dark);

    --shadow:none;
    --shadow-card:none;
    --shadow-modal:0 16px 40px -12px rgba(0,0,0,.18);

    /* Type — Inter throughout. Legacy aliases all point to it. */
    --sans:"Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --mono:"JetBrains Mono", ui-monospace, monospace;
    --serif:var(--sans);
    --serif-display:var(--sans);
    --display:var(--sans);

    /* Radius */
    --r-sm:8px;
    --r-md:16px;
    --r-lg:32px;
    --r-full:9999px;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#1a1a17;color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.4;-webkit-font-smoothing:antialiased;font-weight:400;letter-spacing:0}
  body{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow-x:hidden}
  @media (max-width:520px){ body{padding:0} }

  /* ── Mobile viewport shell ──────────────────────────────────────── */
  .stage{
    width:min(420px, 100vw);
    height:min(900px, 100dvh);
    background:var(--surface-soft);
    position:relative;
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 60px 120px -40px rgba(0,0,0,.5), 0 0 0 1px rgba(0,0,0,.2);
    display:flex;flex-direction:column;
    isolation:isolate;
  }
  @media (max-width:520px){
    .stage{ width:100vw; height:100dvh; border-radius:0; box-shadow:none }
  }

  /* status bar */
  .statusbar{
    height:36px;flex:0 0 36px;display:flex;align-items:center;justify-content:space-between;
    padding:0 22px;font-weight:600;font-size:13px;line-height:1;
    color:var(--ink);
  }
  .statusbar .right{display:flex;gap:6px;align-items:center;font-size:12px;font-weight:600}
  .statusbar .dot{width:18px;height:9px;border:1.5px solid var(--ink);border-radius:3px;position:relative}
  .statusbar .dot::after{content:"";position:absolute;inset:1.5px;background:var(--ink);width:80%;border-radius:1px}

  /* screen container */
  .screen{
    flex:1 1 auto; min-height:0;
    display:flex;flex-direction:column;
    overflow:hidden;
    position:relative;
    background:var(--surface-soft);
  }
  .scroll{ overflow-y:auto; overflow-x:hidden; flex:1 1 auto; -webkit-overflow-scrolling:touch; scrollbar-width:thin}
  .scroll::-webkit-scrollbar{width:6px}
  .scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:3px}

  /* ── Type ───────────────────────────────────────────────────────── */
  .display-xl{ font-family:var(--sans); font-weight:600; font-size:54px; line-height:1.0; letter-spacing:-1.2px }
  .display-lg{ font-family:var(--sans); font-weight:700; font-size:40px; line-height:1.05; letter-spacing:-0.8px }
  .heading-xl{ font-family:var(--sans); font-weight:700; font-size:28px; line-height:1.15; letter-spacing:-1px }
  .heading-lg{ font-family:var(--sans); font-weight:600; font-size:22px; line-height:1.2; letter-spacing:-0.3px }
  .heading-md{ font-family:var(--sans); font-weight:600; font-size:18px; line-height:1.25; letter-spacing:-0.1px }
  .body-md{ font-family:var(--sans); font-weight:400; font-size:15px; line-height:1.45 }
  .body-strong{ font-family:var(--sans); font-weight:600; font-size:15px; line-height:1.45 }
  .body-sm{ font-family:var(--sans); font-weight:400; font-size:13px; line-height:1.4 }
  .body-sm-strong{ font-family:var(--sans); font-weight:700; font-size:13px; line-height:1.4 }
  .caption{ font-family:var(--sans); font-weight:500; font-size:12px; line-height:1.4; color:var(--mute) }

  /* Legacy aliases */
  .editorial{ font-family:var(--sans); font-weight:700; letter-spacing:-0.5px; line-height:1.1 }
  .display{ font-family:var(--sans); font-weight:700; letter-spacing:-1px; line-height:1.0 }
  .mono{ font-family:var(--mono); letter-spacing:0; font-weight:500; font-size:11px }
  .micro{ font-family:var(--sans); font-size:11px; font-weight:600; letter-spacing:0; text-transform:none; color:var(--mute) }
  .micro-ink{ font-family:var(--sans); font-size:13px; font-weight:600; letter-spacing:-0.1px; color:var(--ink) }
  .num{ font-family:var(--sans); font-variant-numeric:tabular-nums; font-weight:600 }

  /* ── Buttons ────────────────────────────────────────────────────── */
  .btn{
    appearance:none; border:0; background:var(--ink); color:#fff;
    font-family:var(--sans); font-size:14px; font-weight:700; line-height:1;
    letter-spacing:-0.1px; text-transform:none;
    height:48px; padding:0 18px;
    border-radius:var(--r-md);
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    cursor:pointer; width:100%;
    box-shadow:none;
    transition: background .12s ease, transform .08s ease;
  }
  .btn .label{display:inline-flex; align-items:center; gap:8px}
  .btn .arrow{font-weight:600; opacity:.85}
  .btn:hover{ background:#1a1a17 }
  .btn:active{ transform:translateY(1px) }

  /* Primary saffron CTA — Pin Grid's single saturated color */
  .btn-saffron{ background:var(--saffron); color:var(--on-saffron); box-shadow:none }
  .btn-saffron:hover{ background:var(--saffron-pressed) }
  .btn-saffron:active{ background:var(--saffron-pressed) }

  .btn-secondary{ background:var(--secondary-bg); color:var(--ink) }
  .btn-secondary:hover{ background:var(--secondary-pressed) }

  .btn-ghost{ background:transparent; color:var(--ink); box-shadow:inset 0 0 0 1.5px var(--ink) }
  .btn-ghost:hover{ background:var(--ink); color:var(--surface-soft) }

  .btn-quiet{ background:var(--surface-card); color:var(--ink); border:0; box-shadow:none }
  .btn-quiet:hover{ background:var(--secondary-bg) }

  .btn-dark{ background:var(--ink); color:#fff }
  .btn-sm{ height:40px; padding:0 14px; font-size:13px }

  .tap{ cursor:pointer; user-select:none }
  .tap:active{ transform:translateY(1px) }

  /* ── Photo placeholder — flat cream tile with mono caption ──────── */
  .ph{
    position:relative; overflow:hidden;
    background:var(--surface-card);
    color:var(--mute);
    border-radius:var(--r-md);
  }
  .ph.dk{ background:var(--surface-dark); color:rgba(255,255,255,.45) }
  .ph .cap{
    position:absolute; left:10px; top:10px; right:10px;
    font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase;
    color:inherit; opacity:.7;
    display:flex; justify-content:space-between; gap:8px;
    pointer-events:none;
  }
  .ph .cap b{ font-weight:500 }
  .ph .corner{
    position:absolute; bottom:10px; right:12px;
    font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase;
    opacity:.55;
  }
  .ph.quiet .cap, .ph.quiet .corner{ display:none }
  .ph::after{
    content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(135deg, transparent 0 18px, rgba(0,0,0,.018) 18px 19px);
    pointer-events:none;
  }
  .ph.dk::after{ background:repeating-linear-gradient(135deg, transparent 0 18px, rgba(255,255,255,.03) 18px 19px) }

  /* hairline rules */
  .rule{ height:1px; background:var(--hairline); width:100% }
  .photo-wrap{ border-radius:var(--r-md); overflow:hidden; position:relative }

  /* Heart fav button — overlay on pin */
  .fav{ position:absolute; top:10px; right:10px; width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,.95); display:inline-flex; align-items:center; justify-content:center; color:var(--ink); border:0; cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.12); z-index:2 }
  .fav:hover{ color:var(--saffron) }
  .fav svg{ width:16px; height:16px; stroke:currentColor; stroke-width:1.8; fill:none }
  .fav.on{ color:var(--saffron) }
  .fav.on svg{ fill:currentColor }

  /* ── Pill chips ────────────────────────────────────────────────── */
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    height:36px; padding:0 16px; border:0;
    font-family:var(--sans); font-size:14px; font-weight:600; line-height:1; letter-spacing:-0.1px;
    color:var(--ink); background:var(--surface-card); cursor:pointer; white-space:nowrap;
    border-radius:var(--r-full);
    transition: background .12s ease, color .12s ease;
  }
  .chip.on{ background:var(--ink); color:#fff }
  .chip:hover:not(.on){ background:var(--secondary-bg) }

  /* ── Soft pill badges ──────────────────────────────────────────── */
  .b2{
    display:inline-flex;align-items:center;gap:4px;
    font-family:var(--sans); font-size:11px; font-weight:700; line-height:1;
    letter-spacing:0; text-transform:none;
    padding:6px 10px; border-radius:var(--r-full); border:0;
    background:var(--surface-card); color:var(--ink);
  }
  .b2.accent{ color:var(--on-saffron); background:var(--saffron) }
  .b2.ok{ color:var(--ok); background:var(--ok-pale) }
  .b2.warn{ color:#5a3f12; background:#F5E9CC }
  .b2.err{ color:#fff; background:var(--err) }
  .b2.solid{ background:var(--ink); color:#fff }
  .b2.dark{ background:var(--ink); color:#fff }

  /* ── Topbar ────────────────────────────────────────────────────── */
  .topbar{
    position:sticky; top:0; z-index:5;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; background:var(--surface-soft);
    min-height:64px;
  }
  .topbar.flush{ border-bottom:0 }
  .topbar .ttl{ display:flex; flex-direction:column; line-height:1.1; gap:2px }
  .icon-btn{
    width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;
    border:0; background:var(--surface-card); cursor:pointer; border-radius:var(--r-full);
    color:var(--ink); font-size:14px;
  }
  .icon-btn:hover{ background:var(--secondary-bg) }
  .icon-btn svg{ width:18px; height:18px; stroke-width:1.8 }

  /* number stepper — pill */
  .stepper{ display:inline-flex; align-items:center; background:var(--surface-card); height:40px; padding:0; border:0; border-radius:var(--r-full); overflow:hidden }
  .stepper button{ appearance:none; border:0; background:transparent; width:40px; height:40px; cursor:pointer; font-size:18px; font-weight:600; color:var(--ink); border-radius:0 }
  .stepper button:hover{ background:var(--secondary-bg) }
  .stepper button:disabled{ color:var(--ash); cursor:not-allowed }
  .stepper .v{ min-width:30px; text-align:center; font-size:14px; font-weight:600; color:var(--ink) }

  /* sticky bottom action */
  .sticky-bot{
    position:sticky; bottom:0; z-index:6;
    padding:14px 16px 18px; background:var(--surface-soft);
    box-shadow:0 -8px 16px -8px rgba(0,0,0,.06);
  }

  /* sheet (bottom modal) */
  .sheet-bg{ position:absolute; inset:0; background:rgba(0,0,0,.5); z-index:20; animation:fadein .18s ease }
  .sheet{
    position:absolute; left:0; right:0; bottom:0; z-index:21;
    background:var(--canvas);
    border-top-left-radius:var(--r-lg); border-top-right-radius:var(--r-lg);
    max-height:90%; display:flex; flex-direction:column; overflow:hidden;
    animation:slideup .26s cubic-bezier(.2,.7,.2,1);
    box-shadow:var(--shadow-modal);
  }
  .sheet .grab{ width:36px; height:5px; background:var(--hairline); border-radius:3px; margin:10px auto 0 }
  @keyframes slideup{ from{transform:translateY(20%); opacity:.5} to{transform:translateY(0); opacity:1} }
  @keyframes fadein{ from{opacity:0} to{opacity:1} }

  /* toast */
  .toast{
    position:absolute; left:50%; bottom:90px; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:12px 18px;
    font-size:13px; font-weight:600;
    border-radius:var(--r-full);
    z-index:30; box-shadow:0 8px 24px rgba(0,0,0,.2);
    animation:fadein .15s ease;
    white-space:nowrap;
  }

  /* tab bar */
  .tabbar{
    flex:0 0 auto;
    display:grid; grid-template-columns:repeat(4,1fr);
    background:var(--surface-soft); padding:8px 6px 14px;
    border-top:1px solid var(--hairline);
  }
  .tabbar button{
    appearance:none;border:0;background:transparent;cursor:pointer;
    padding:8px 4px 4px; display:flex;flex-direction:column;align-items:center;gap:4px;
    color:var(--mute);
    font-family:var(--sans); font-size:10px; font-weight:600; line-height:1; letter-spacing:0;
  }
  .tabbar svg{ width:22px;height:22px;display:block; stroke-width:1.8 }
  .tabbar button.on{ color:var(--ink) }
  .tabbar button.on svg{ stroke-width:2.2 }

  .lnk{ color:var(--ink); text-decoration:underline; text-underline-offset:3px; cursor:pointer }
  .lnk:hover{ color:var(--saffron) }

  .skel{ background:linear-gradient(90deg, var(--surface-card) 0%, var(--secondary-bg) 50%, var(--surface-card) 100%); background-size:200% 100%; animation:shimmer 1.2s infinite linear; border-radius:var(--r-md) }
  @keyframes shimmer{ 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .screen-fade{ animation:screenIn .14s ease both }
  @keyframes screenIn{ from{opacity:.7; transform:translateY(2px)} to{opacity:1; transform:none} }

  /* ── Masonry · 2-col column layout, 8px gutters ─────────────────── */
  .masonry{ column-count:2; column-gap:8px; }
  .masonry > *{ break-inside:avoid; margin:0 0 8px }

  /* ── Pin card (icard) — image IS the card, no internal padding ─── */
  .icard{ display:block; background:transparent; border-radius:var(--r-md); position:relative; overflow:visible; cursor:pointer }
  .icard .photo-wrap, .icard > .ph{ border-radius:var(--r-md); overflow:hidden; position:relative }
  .icard .body{ padding:8px 6px 4px; display:flex; flex-direction:column; gap:4px }
  .icard .nm{ font-family:var(--sans); font-size:14px; font-weight:600; line-height:1.25; letter-spacing:-0.1px; color:var(--ink); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden }
  .icard .ds{ font-size:12px; color:var(--mute); line-height:1.4 }
  .icard .ft{ display:flex; align-items:center; justify-content:space-between; margin-top:2px; gap:6px }
  .icard .pr{ font-family:var(--sans); font-size:13px; font-weight:600; color:var(--ink); letter-spacing:0 }
  .icard .add{
    appearance:none; border:0; background:var(--saffron); color:#fff;
    width:32px; height:32px; cursor:pointer;
    font-size:18px; line-height:1; border-radius:50%;
    display:inline-flex; align-items:center; justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
    transition: background .12s ease, transform .12s ease;
  }
  .icard .add:hover{ background:var(--saffron-pressed); transform:scale(1.08) }
  .icard.unav{ opacity:.55 }
  .icard.unav .add{ pointer-events:none; background:var(--surface-card); color:var(--ash) }

  /* Pin overlay pill — anchored chip on imagery */
  .pin-pill{
    position:absolute; left:10px; bottom:10px; z-index:2;
    background:#fff; color:var(--ink);
    font-family:var(--sans); font-size:11px; font-weight:700; line-height:1;
    padding:7px 11px; border-radius:var(--r-full);
    box-shadow:0 1px 3px rgba(0,0,0,.1);
    max-width:calc(100% - 56px);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .pin-pill.dark{ background:rgba(0,0,0,.8); color:#fff; backdrop-filter:blur(6px) }

  /* ── Image treatment ───────────────────────────────────────────── */
  .duo{ position:relative; overflow:hidden; background:var(--surface-card); }
  .duo img{ display:block; width:100%; height:100%; object-fit:cover; }
  .duo::after{ display:none }
  .duo::before{ display:none }
  /* Flat — no overlay treatments. The photograph is the design. */
  .duo.dramatic::before{ content:""; position:absolute; inset:0; background:linear-gradient(180deg, transparent 50%, rgba(0,0,0,.5) 100%); pointer-events:none }
  .duo.quiet::before{ content:""; position:absolute; inset:0; background:linear-gradient(180deg, transparent 65%, rgba(0,0,0,.25) 100%); pointer-events:none }

  /* ── Hero — cream chrome with display headline & big pin ────────── */
  .hero{ position:relative; padding:24px 20px 16px; background:var(--surface-soft); color:var(--ink) }
  .hero .hero-eyebrow{ font-size:13px; font-weight:600; color:var(--mute); margin-bottom:12px }
  .hero h1{ font-family:var(--sans); font-weight:600; font-size:48px; line-height:1.0; letter-spacing:-1.4px; margin:0; max-width:14ch; color:var(--ink) }
  .hero h1 em{ font-style:normal; color:var(--saffron); font-weight:600 }
  .hero .hero-sub{ margin:14px 0 0; color:var(--body); font-size:15px; line-height:1.45 }

  /* ── Strip rail (horizontal scroll) ─────────────────────────────── */
  .strip{ padding:24px 0 4px; position:relative }
  .strip-head{ display:flex; align-items:baseline; justify-content:space-between; padding:0 20px; margin-bottom:14px; gap:12px }
  .strip-head .ttl{ font-family:var(--sans); font-size:22px; font-weight:700; line-height:1.15; letter-spacing:-0.5px; color:var(--ink) }
  .strip-head .ttl em{ font-style:normal; color:var(--saffron) }
  .strip-head .more{ font-size:13px; font-weight:600; color:var(--mute); cursor:pointer; padding:6px 0; letter-spacing:0; text-transform:none }
  .strip-head .more:hover{ color:var(--saffron) }
  .rail{
    display:flex; gap:8px; overflow-x:auto; scroll-snap-type:x mandatory;
    padding:2px 20px 14px; scrollbar-width:none;
  }
  .rail::-webkit-scrollbar{ display:none }
  .rail > *{ scroll-snap-align:start; flex:0 0 auto }

  .ornament{ display:none }

  /* Pick card — featured pin */
  .pick{
    width:180px; cursor:pointer; position:relative;
    display:flex; flex-direction:column;
  }
  .pick .img{
    height:240px; width:100%; border-radius:var(--r-md); overflow:hidden;
    position:relative;
    transition:transform .22s cubic-bezier(.2,.7,.2,1);
  }
  .pick:hover .img{ transform:translateY(-2px) }
  .pick .nm{ font-family:var(--sans); font-size:14px; font-weight:600; line-height:1.3; letter-spacing:-0.1px; color:var(--ink); margin-top:10px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden }
  .pick .meta{ display:flex; justify-content:space-between; align-items:center; margin-top:4px; gap:6px }
  .pick .pr{ font-size:13px; font-weight:600; color:var(--ink) }
  .pick .badge{
    position:absolute; top:10px; left:10px; z-index:2;
    font-family:var(--sans); font-size:11px; font-weight:700; line-height:1;
    padding:6px 10px; border-radius:var(--r-full);
    background:#fff; color:var(--ink);
    box-shadow:0 1px 3px rgba(0,0,0,.1);
  }
  .pick .badge.gold{ background:var(--saffron); color:#fff }
  .pick .badge.dark{ background:var(--ink); color:#fff }
  .pick .pluschip{
    position:absolute; bottom:10px; right:10px; z-index:2;
    width:34px; height:34px; border-radius:50%;
    background:var(--saffron); color:#fff;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:18px; line-height:1; border:0; cursor:pointer;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
    transition:transform .12s ease, background .12s ease;
  }
  .pick .pluschip:hover{ background:var(--saffron-pressed); transform:scale(1.08) }

    display:flex; flex-direction:column;

  .quick .nm{ font-family:var(--sans); font-size:13px; font-weight:600; line-height:1.3; color:var(--ink); margin-top:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden }
  .quick .pr{ font-size:12px; font-weight:600; color:var(--ink); margin-top:2px }

  /* Editorial category card (3-col grid) — square pin tiles */

    aspect-ratio:1/1; position:relative; overflow:hidden; cursor:pointer;
    border-radius:var(--r-md); background:var(--surface-card);
    transition:transform .12s ease;
  }

  .cat-card .img{ position:absolute; inset:0 }

    position:absolute; left:10px; bottom:10px; right:10px; z-index:2;
    color:#fff; font-family:var(--sans); font-size:14px; font-weight:700; line-height:1.15; letter-spacing:-0.2px;
    text-shadow:0 1px 4px rgba(0,0,0,.4);
  }
  .cat-card .num{ display:none }

    display:flex; gap:12px; align-items:center; padding:14px 20px;
    border-bottom:1px solid var(--hairline); cursor:pointer; transition:background .1s ease;

  .past:last-child{ border-bottom:0 }
  .past .ix{ display:none }

  .past .nm{ font-family:var(--sans); font-size:15px; font-weight:600; line-height:1.2; color:var(--ink); letter-spacing:-0.1px }

  .past .reorder{
    font-family:var(--sans); font-size:13px; font-weight:700;
    color:var(--ink); padding:8px 14px; border:0; border-radius:var(--r-full);

  }

  .diet.nv{ color:#962d2d }
  .diet.jain{ color:#a4844b }
  .diet.vgn{ color:#2f6b2f }

    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

  const id = IMG_BY_KIND[kind];
  if(!id) return null;
  return `https://images.unsplash.com/${id}?w=${w||400}&q=65&auto=format&fit=crop`;
}

// Image tile with palette + real photo + warm duotone overlay
function ImgTile({ kind, color, h, label, dark, badge, style, flat, quiet }){
  const p = ART_PALETTE[color] || ART_PALETTE.cream;
  const url = imgUrl(kind, h > 240 ? 720 : (h > 140 ? 480 : 260));
  const cls = "duo" + (flat ? " flat" : "") + (quiet ? " quiet" : "");
  return (
    <div className={cls} style={{
      position:"relative",
      background:p.bg, color:p.ink, height:h, ...style
    }}>
      {url ? (
        <img src={url} alt="" decoding="async"
          onError={(e)=>{ e.currentTarget.style.display = "none"; }} />
      ) : null}
      {badge ? (
        <div style={{position:"absolute", right:10, top:10, zIndex:2, fontFamily:"var(--sans)", fontWeight:600, fontSize:9, letterSpacing:"0", textTransform:"none", padding:"6px 9px", borderRadius:"999px", background:"rgba(244,236,210,.95)", color:"var(--ink)"}}>
          {badge}
        </div>
      ) : null}
    </div>
  );
}

// Helper: get the right kind+color for an item
function imgForItem(it){
  return {
    kind: ART_BY_ID[it.id] || ("cat-" + it.cat),
    color: PALETTE_BY_CAT[it.cat] || "cream",
  };
}
function imgForCat(c){
  return {
    kind: "cat-" + c.id,
    color: PALETTE_BY_CAT[c.id] || "cream",
  };
}

Object.assign(window, { Illust, ImgTile, ART_PALETTE, imgForItem, imgForCat });

</script>

// ─────────────────────────────────────────────────────────────────────────────
// 3. MENU (search + filters + masonry of items)
// ─────────────────────────────────────────────────────────────────────────────
function Menu({ go, initialCat, openAI }){
  const [tab, setTab] = useS(initialCat || "meal");
  const [q, setQ] = useS("");
  const [filters, setFilters] = useS([]);

  const cats = window.CATS;
  const activeCat = cats.find(c=>c.id===tab) || cats[0];

  const items = useM(()=>{
    let a = window.ITEMS.filter(i=>i.cat===tab);
    if(q) a = a.filter(i=> (i.n + " " + i.d).toLowerCase().includes(q.toLowerCase()));
    if(filters.includes("pop")) a = a.filter(i=>i.pop);
    if(filters.includes("jain")) a = a.filter(i=>i.diet.includes("jain"));
    if(filters.includes("vgn")) a = a.filter(i=>i.diet.includes("vgn"));
    if(filters.includes("quick")) a = a.filter(i=>i.quick);
    if(filters.includes("u100")) a = a.filter(i=>i.p>0 && i.p<=100);
    if(filters.includes("u200")) a = a.filter(i=>i.p>0 && i.p<=200);
    return a;
  }, [tab,q,filters]);

  const toggle = (k)=> setFilters(f => f.includes(k) ? f.filter(x=>x!==k) : [...f,k]);

  return (
    <div className="screen screen-fade" data-screen-label="Menu">
      <StatusBar/>
      {/* Pin Grid topbar — back + search + cart */}
      <div className="topbar" style={{padding:"10px 16px", gap:10}}>
        <button className="icon-btn" onClick={()=>go("home")} aria-label="Back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div className="search" style={{flex:1, height:44}}>
          <span style={{color:"var(--mute)", display:"inline-flex"}}>{Ic.search}</span>
          <input placeholder={"Search " + activeCat.t.toLowerCase() + "…"} value={q} onChange={e=>setQ(e.target.value)}/>
          {q ? <button onClick={()=>setQ("")} style={{appearance:"none", border:0, background:"transparent", color:"var(--mute)", cursor:"pointer", fontSize:18, padding:0}}>×</button> : null}
        </div>
        <button className="icon-btn" onClick={()=>go("cart")} aria-label="Cart" style={{position:"relative"}}>
          {Ic.cart}
        </button>
      </div>

      <div className="scroll">
        {/* Category title — sentence-case display */}
        <div style={{padding:"18px 20px 14px"}}>
          <div className="caption" style={{color:"var(--mute)", marginBottom:8}}>{activeCat.s} · {items.length} items</div>
          <h1 style={{margin:0, fontFamily:"var(--sans)", fontWeight:700, fontSize:40, lineHeight:1.0, letterSpacing:"-1.4px", color:"var(--ink)"}}>{activeCat.t}</h1>
        </div>

        {/* Category chip rail */}
        <div style={{display:"flex", gap:8, padding:"4px 20px 4px", overflowX:"auto", scrollbarWidth:"none"}}>
          <style>{`.scroll [style*="overflow-x"]::-webkit-scrollbar{display:none}`}</style>
          {cats.map(c => (
            <button key={c.id} className={"chip " + (tab===c.id?"on":"")} onClick={()=>setTab(c.id)}>{c.t}</button>
          ))}
        </div>

        {/* Filter chips */}
        <div style={{display:"flex", gap:6, padding:"12px 20px 4px", overflowX:"auto", scrollbarWidth:"none"}}>
          {window.FILTERS.map(f => (
            <button key={f.id}
              onClick={()=>toggle(f.id)}
              className={"chip " + (filters.includes(f.id)?"on":"")}
              style={{height:32, padding:"0 14px", fontSize:13}}
            >
              {f.t}
            </button>
          ))}
        </div>

        <div style={{padding:"14px 20px 28px"}}>
          <div className="masonry">
            {items.map((it, i)=>(
              <div key={it.id} className={"icard tap " + (it.unav?"unav":"")} onClick={()=>!it.unav && go("item", {id:it.id})}>
                <div style={{position:"relative"}}>
                  {(()=>{ const ii = imgForItem(it); return <ImgTile kind={ii.kind} color={ii.color} h={Math.max(160, it.h*0.7)} style={{borderRadius:16}}/>; })()}
                  {it.pop ? <span style={{position:"absolute", top:10, left:10, zIndex:2, fontFamily:"var(--sans)", fontWeight:700, fontSize:11, lineHeight:1, padding:"7px 11px", borderRadius:999, background:"#fff", color:"var(--ink)", boxShadow:"0 1px 3px rgba(0,0,0,.1)", whiteSpace:"nowrap"}}>Top order</span> : null}
                  {it.unav ? <span style={{position:"absolute", top:10, left:10, zIndex:2, fontFamily:"var(--sans)", fontWeight:700, fontSize:11, lineHeight:1, padding:"7px 11px", borderRadius:999, background:"var(--ink)", color:"#fff", whiteSpace:"nowrap"}}>Sold out</span> : null}
                  <button className="add" style={{position:"absolute", bottom:10, right:10, zIndex:2}} onClick={(e)=>{e.stopPropagation(); !it.unav && go("item", {id:it.id})}}>+</button>
                </div>
                <div className="body">
                  <div className="nm">{it.n}</div>
                  <div className="ft">
                    <span className="pr">{fmt(it.p, "INR")}</span>
                    <span style={{fontSize:10, color:"var(--ink-3)", letterSpacing:"0"}}>{it.prep}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
          {items.length===0 ? (
            <div style={{textAlign:"center", padding:"40px 20px"}}>
              <div className="editorial" style={{fontSize:24, marginBottom:8, fontFamily:"var(--sans)"}}>Nothing matches.</div>
              <p style={{color:"var(--ink-3)", fontSize:13, margin:"0 0 14px"}}>Try fewer filters, or ask the AI concierge for a recommendation.</p>
              <button className="btn btn-ghost" style={{maxWidth:240, margin:"0 auto"}} onClick={openAI}>
                <span className="label">Ask the concierge</span><span className="arrow">→</span>
              </button>
            </div>
          ) : null}
        </div>
      </div>
    </div>
  );
}

  );

// ─────────────────────────────────────────────────────────────────────────────
// 5. CART
// ─────────────────────────────────────────────────────────────────────────────
function Cart({ go, cart, setCart, hotel }){
  const subtotal = cart.reduce((s,c)=>s+c.total, 0);
  const tax = Math.round(subtotal*0.05);
  const service = Math.round(subtotal*0.10);
  const [tipPct, setTipPct] = useS(0);
  const [editingNote, setEditingNote] = useS(null);
  const tip = Math.round(subtotal * tipPct / 100);
  const total = subtotal+tax+service+tip;

  // Estimated arrival based on slowest prep time
  const maxPrep = cart.reduce((m,c)=>{
    const n = parseInt(c.it.prep) || 20;
    return Math.max(m, n);
  }, 22);
  const eta = `${maxPrep} – ${maxPrep+6} minutes`;

  const upsell = window.ITEMS.filter(i=>i.cat==="des" || i.cat==="bev").slice(0,3);

  const setQty = (idx, q)=>{
    setCart(cart.map((c,i)=>{
      if(i!==idx) return c;
      const unit = c.total/c.qty;
      return {...c, qty:q, total: unit*q};
    }));
  };
  const setNote = (idx, note)=>{
    setCart(cart.map((c,i)=> i===idx ? {...c, note} : c));
  };
  const remove = (idx)=> setCart(cart.filter((_,i)=>i!==idx));

  if(cart.length===0){
    return (
      <div className="screen screen-fade" data-screen-label="Cart">
        <StatusBar/>
        <TopBar onBack={()=>go(-1)} title="Your order"/>
        <div style={{flex:1, display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", padding:40, textAlign:"center"}}>
          <div style={{width:80, height:80, borderRadius:"50%", background:"var(--surface-card)", display:"flex", alignItems:"center", justifyContent:"center", marginBottom:22}}>
            <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="var(--mute)" strokeWidth="1.5"><path d="M3 4h3l3 12h11l2-9H7"/><circle cx="10" cy="20" r="1.6"/><circle cx="18" cy="20" r="1.6"/></svg>
          </div>
          <h1 style={{margin:0, fontFamily:"var(--sans)", fontWeight:700, fontSize:34, lineHeight:1.0, maxWidth:"14ch", letterSpacing:"-1.4px", color:"var(--ink)"}}>Nothing here <span style={{color:"var(--saffron)"}}>yet.</span></h1>
          <p style={{color:"var(--body)", maxWidth:"32ch", margin:"14px 0 26px", fontSize:15, lineHeight:1.5, fontFamily:"var(--sans)"}}>Browse the menu, choose a few favourites — we'll see them safely up to your room.</p>
          <button className="btn btn-saffron" style={{maxWidth:280}} onClick={()=>go("menu")}>
            <span className="label">Browse the menu</span>
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="screen screen-fade" data-screen-label="Cart">
      <div className="scroll">
        {/* Header — Pin Grid: display headline on cream */}
        <div style={{padding:"14px 20px 14px", position:"sticky", top:0, background:"var(--surface-soft)", zIndex:5}}>
          <div className="between" style={{marginBottom:18}}>
            <button onClick={()=>go(-1)} aria-label="Back" className="icon-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <div className="caption">{cart.length} {cart.length===1?"item":"items"}</div>
            <div style={{width:40}}/>
          </div>
          <div className="caption" style={{marginBottom:6, color:"var(--mute)"}}>Your order</div>
          <h1 style={{margin:0, fontFamily:"var(--sans)", fontWeight:700, fontSize:36, lineHeight:1.0, letterSpacing:"-1.4px", color:"var(--ink)"}}>
            On its way to <span style={{color:"var(--saffron)"}}>Room {hotel ? hotel.room : "412"}</span>.
          </h1>
        </div>

        {/* Estimated arrival ribbon */}
        <div style={{padding:"6px 24px 4px"}}>
          <div className="between" style={{padding:"16px 18px", background:"var(--paper-2)", borderRadius:14}}>
            <div className="hstack" style={{gap:12}}>
              <div style={{width:36, height:36, borderRadius:"50%", background:"var(--ink)", color:"var(--accent-2)", display:"inline-flex", alignItems:"center", justifyContent:"center"}}>
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
              </div>
              <div>
                <div className="micro" style={{marginBottom:3}}>Estimated arrival</div>
                <div style={{font:"600 16px/1.2 var(--sans)", color:"var(--ink)"}}>{eta}</div>
              </div>
            </div>
            <div style={{font:"500 10px/1 var(--sans)", letterSpacing:".22em", textTransform:"uppercase", color:"var(--ink-3)"}}>ASAP</div>
          </div>
        </div>

        <div style={{padding:"14px 24px 0"}}>
          {cart.map((c,i)=>(
            <div key={i} style={{display:"flex", gap:14, padding:"18px 0", borderBottom:"1px solid var(--rule)"}}>
              {(()=>{ const ii = imgForItem(c.it); return <ImgTile kind={ii.kind} color={ii.color} h={96} style={{width:96, flex:"0 0 96px", borderRadius:14}}/>; })()}
              <div style={{flex:1, minWidth:0}}>

                    style={{fontFamily:"var(--sans)", fontSize:13, minHeight:54, padding:"10px 12px", marginBottom:8, borderRadius:10}}/>

                    "{c.note}"

                <div className="between" style={{marginTop:6}}>
                  <Stepper value={c.qty} onChange={(q)=>setQty(i,q)}/>
                  <div className="hstack" style={{gap:14}}>
                    {!c.note && editingNote !== i ? (
                      <button onClick={()=>setEditingNote(i)} style={{appearance:"none", border:0, background:"transparent", cursor:"pointer", padding:0, font:"500 9.5px/1 var(--sans)", letterSpacing:"0", textTransform:"none", color:"var(--ink-3)"}}>+ Note</button>

                    <button onClick={()=>remove(i)} style={{appearance:"none", border:0, background:"transparent", cursor:"pointer", padding:0, font:"500 9.5px/1 var(--sans)", letterSpacing:"0", textTransform:"none", color:"var(--ink-3)"}}>Remove</button>
                  </div>
                </div>
              </div>
              <div className="num" style={{fontSize:15, color:"var(--ink)", letterSpacing:"0", whiteSpace:"nowrap", fontWeight:500}}>{fmt(c.total, "INR")}</div>
            </div>
          ))}
        </div>

function AIConcierge({ onClose, onAddToCart, go }){
  const [msgs, setMsgs] = useS([
    { who:"bot", text: window.AI_REPLY.greeting }
  ]);
  const [input, setInput] = useS("");
  const scrollRef = useR(null);

  useE(()=>{
    if(scrollRef.current){
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  },[msgs]);

  const reply = (q)=>{
    const lq = q.toLowerCase();
    let r = null;
    if(lq.includes("vegetarian") || lq.includes("veg")) r = window.AI_REPLY.veg;
    else if(lq.includes("500") || lq.includes("under")) r = window.AI_REPLY.under500;
    else if(lq.includes("light") || lq.includes("healthy")) r = window.AI_REPLY.light;
    else r = { text:"A few I'd recommend right now — say the word and I'll add any of them.", items:["i1","i3","f3"] };
    return r;
  };

  const send = (q)=>{
    setMsgs(m => [...m, { who:"user", text:q }]);
    setInput("");
    setTimeout(()=>{
      const r = reply(q);
      setMsgs(m => [...m, { who:"bot", text:r.text, recs: r.items }]);
    }, 700);
  };

  return (
    <div className="screen screen-fade" data-screen-label="AI Concierge" style={{background:"var(--surface-soft)"}}>
      <StatusBar/>
      <div className="topbar">
        <div className="hstack" style={{gap:12}}>
          <button className="icon-btn" onClick={onClose}>✕</button>
          <div className="ttl">
            <span style={{fontSize:13, fontWeight:600, color:"var(--mute)"}}>Concierge</span>
            <span style={{fontSize:16, fontWeight:700, letterSpacing:"-0.3px", color:"var(--ink)"}}>Recommendations</span>
          </div>
        </div>
        <span className="b2 ok">Online</span>
      </div>

      <div className="scroll" ref={scrollRef} style={{padding:"14px 16px"}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{marginBottom:14}}>
            <div className={"ai-msg " + m.who}>
              <div className="who">{m.who==="bot"?"Concierge":"You"}</div>
              <p>{m.text}</p>
            </div>
            {m.recs ? (
              <div style={{marginTop:10, marginRight:36, display:"flex", flexDirection:"column", gap:8}}>
                {m.recs.map(rid=>{
                  const it = window.ITEMS.find(x=>x.id===rid);
                  if(!it) return null;
                  return (
                    <div key={rid} className="ai-rec">
                      {(()=>{ const ii = imgForItem(it); return <ImgTile kind={ii.kind} color={ii.color} h={64} style={{width:64, flex:"0 0 64px"}}/>; })()}
                      <div className="body">
                        <div>
                          <div style={{fontSize:14, fontWeight:600, lineHeight:1.2, marginBottom:3, color:"var(--ink)", letterSpacing:"-0.1px"}}>{it.n}</div>
                          <div style={{fontSize:12, color:"var(--mute)", lineHeight:1.4, fontWeight:500}}>{it.d.split(",").slice(0,2).join(",")}</div>
                        </div>
                        <div className="between">
                          <span style={{fontSize:13, fontWeight:600, color:"var(--ink)"}}>{fmt(it.p,"INR")} · <span style={{color:"var(--mute)"}}>{it.prep}</span></span>
                          <button className="add" style={{width:28, height:28, fontSize:16}} onClick={()=>{
                            onAddToCart(it,{qty:1,size:"regular",spice:"medium",extras:[],note:"",total:it.p});
                          }}>+</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            ) : null}
          </div>
        ))}
      </div>

      {/* Suggested prompts */}
      {msgs.length<=2 ? (
        <div style={{padding:"0 16px 12px"}}>
          <div className="caption" style={{marginBottom:8, color:"var(--mute)"}}>Try asking</div>
          <div style={{display:"flex", gap:6, overflowX:"auto", scrollbarWidth:"none"}}>
            {window.AI_PROMPTS.map(p=>(
              <button key={p} className="chip" onClick={()=>send(p)}>{p}</button>
            ))}
          </div>
        </div>
      ) : null}

      <div style={{padding:"12px 16px 18px", borderTop:"1px solid var(--hairline)", background:"var(--surface-soft)"}}>
        <div className="search">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--mute)" strokeWidth="2"><path d="M12 2l1.5 6.5L20 10l-6.5 1.5L12 18l-1.5-6.5L4 10l6.5-1.5z"/></svg>
          <input placeholder="Ask the concierge anything…" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter" && input.trim()) send(input.trim()) }}/>
          <button onClick={()=>input.trim() && send(input.trim())} style={{appearance:"none", border:0, background:"var(--saffron)", color:"#fff", width:32, height:32, borderRadius:"50%", cursor:"pointer", fontSize:16, fontWeight:700}}>→</button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// 11. SCHEDULE (Phase 2 — breakfast pre-order)
// ─────────────────────────────────────────────────────────────────────────────
function Schedule({ go, onSchedule }){
  const [type, setType] = useS("schedule");
  const [date, setDate] = useS("tomorrow");
  const [slot, setSlot] = useS("0700");
  const [combo, setCombo] = useS("continental");

  const slots = ["0630","0700","0730","0800","0830","0900","0930","1000","1030"];
  const combos = [
    { id:"continental", t:"The continental",   s:"Viennoiserie · fruit · juice · coffee", p:1200, ph:"TRAY / MORNING" },
    { id:"madras",      t:"South Indian",       s:"Idli · dosa · vada · filter coffee",   p:840,  ph:"DOSA / TOP" },
    { id:"english",     t:"Full English",       s:"Eggs · sausage · beans · toast",        p:1450, ph:"PLATE / EGGS" },
    { id:"asian",       t:"Asian congee bowl",  s:"Rice porridge · pickles · tea",         p:780,  ph:"BOWL / WHITE" },
  ];

  return (
    <div className="screen screen-fade" data-screen-label="Schedule">
      <StatusBar/>
      <TopBar onBack={()=>go(-1)} title="Schedule" sub="Pre-order"/>
      <div className="scroll">
        <div className="pad">
          <div className="editorial" style={{fontSize:32, lineHeight:1, letterSpacing:"-1px", margin:"4px 0 16px", maxWidth:"18ch"}}>Breakfast, exactly when you want it.</div>
          <p style={{color:"var(--ink-3)", fontSize:13, lineHeight:1.55, margin:"0 0 22px", maxWidth:"36ch"}}>Choose a time and a combo. We'll have it on the floor at your door, freshly plated.</p>

          <div className="between" style={{marginBottom:10}}>
            <span className="micro-ink">When</span>
          </div>
          <div className="seg" style={{marginBottom:14}}>
            <button className={type==="asap"?"on":""} onClick={()=>setType("asap")}>Now</button>
            <button className={type==="schedule"?"on":""} onClick={()=>setType("schedule")}>Schedule</button>
          </div>

          {type==="schedule" ? (
            <>
              <div className="micro" style={{marginBottom:8}}>Date</div>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6, marginBottom:18}}>
                {[
                  {k:"today", t:"Today", d:"7 May", dis:true},
                  {k:"tomorrow", t:"Tomorrow", d:"8 May"},
                  {k:"sat", t:"Saturday", d:"9 May"},
                ].map(o=>(
                  <button key={o.k} disabled={o.dis} className={"chip " + (date===o.k?"on":"")} style={{height:60, flexDirection:"column", gap:4, padding:"10px 6px", opacity:o.dis?.4:1, borderRadius:0}}>}} onClick={()=>!o.dis && setDate(o.k)}>
                    <span style={{fontSize:9.5}}>{o.t}</span>
                    <span style={{fontFamily:"var(--mono)", fontSize:11}}>{o.d}</span>
                  </button>
                ))}
              </div>

              <div className="between" style={{marginBottom:8}}>
                <span className="micro">Time</span>
                <span className="micro" style={{color:"var(--warn)"}}>Cutoff 02:00</span>
              </div>
              <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:6, marginBottom:24}}>
                {slots.map(s=>(
                  <button key={s} className={"chip " + (slot===s?"on":"")} style={{height:46, fontSize:12, borderRadius:0}} onClick={()=>setSlot(s)}>
                    {s.slice(0,2)}:{s.slice(2)}
                  </button>
                ))}
              </div>
            </>
          ) : null}

          <div className="rule" style={{margin:"6px 0 18px"}}></div>

          <div className="micro-ink" style={{marginBottom:10}}>Choose a combo</div>
          <div style={{display:"flex", flexDirection:"column", gap:8}}>
            {combos.map(c=>(
              <div key={c.id} className={"rrow tap " + (combo===c.id?"on":"")} onClick={()=>setCombo(c.id)} style={{padding:"10px 0", gap:12}}>
                <span className="rd"></span>
                <ImgTile kind={{continental:"tray", madras:"dosa", english:"toast", asian:"bowl"}[c.id] || "tray"} color={["ochre","sage","terra","plum"][combos.findIndex(x=>x.id===c.id)%4]} h={50} style={{width:50, flex:"0 0 50px"}}/>
                <div style={{flex:1}}>
                  <div className="ttl">{c.t}</div>
                  <div className="sub">{c.s}</div>
                </div>
                <span className="num" style={{fontSize:12}}>{fmt(c.p,"INR")}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{height:90}}></div>
      </div>
      <div className="sticky-bot">
        <button className="btn" onClick={()=>onSchedule({type,date,slot,combo})}>
          <span className="label">Confirm pre-order</span>
          <span className="arrow">{type==="schedule" ? `${slot.slice(0,2)}:${slot.slice(2)} →` : "→"}</span>
        </button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// 12. STAY / Account (small)
// ─────────────────────────────────────────────────────────────────────────────
function Stay({ go, hotel }){
  return (
    <div className="screen screen-fade" data-screen-label="Stay">
      <StatusBar/>
      <div className="topbar" style={{padding:"10px 16px", gap:10}}>
        <div style={{display:"flex", alignItems:"center", gap:8}}>
          <span style={{width:30, height:30, borderRadius:"50%", background:"var(--saffron)", color:"#fff", display:"inline-flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:15, letterSpacing:"-0.5px"}}>s</span>
          <span style={{fontWeight:700, fontSize:18, color:"var(--ink)", letterSpacing:"-0.4px"}}>Your stay</span>
        </div>
      </div>

      <div className="scroll">
        {/* Display headline */}
        <div style={{padding:"18px 20px 16px"}}>
          <div className="caption" style={{color:"var(--mute)", marginBottom:8}}>Room {hotel.room} · 3 nights</div>
          <h1 style={{margin:0, fontFamily:"var(--sans)", fontWeight:700, fontSize:40, lineHeight:1.0, letterSpacing:"-1.6px", color:"var(--ink)", maxWidth:"14ch"}}>
            Welcome back,<br/><span style={{color:"var(--saffron)"}}>{hotel.guest.split(" ").slice(-1)[0]}.</span>

        {/* Stay facts */}
        <div style={{padding:"8px 20px 6px"}}>

              <div className="caption" style={{marginBottom:8, color:"var(--mute)"}}>Check-out</div>
              <div style={{fontSize:24, fontWeight:700, letterSpacing:"-1px", color:"var(--ink)"}}>9 May</div>
              <div style={{fontSize:13, color:"var(--mute)", marginTop:4, fontWeight:500}}>by 12:00 noon</div>
            </div>
            <div style={{padding:"18px", background:"var(--ink)", color:"#fff", borderRadius:16}}>
              <div className="caption" style={{marginBottom:8, color:"rgba(255,255,255,.6)"}}>Folio so far</div>
              <div style={{fontSize:24, fontWeight:700, letterSpacing:"-1px"}}>₹14,820</div>
              <div style={{fontSize:13, color:"rgba(255,255,255,.6)", marginTop:4, fontWeight:500}}>3 nights · 2 orders</div>
            </div>
          </div>
        </div>

        {/* Quick actions */}
        <div className="strip" style={{paddingTop:18}}>
          <div className="strip-head">

          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, padding:"0 20px 4px"}}>

              { t:"Call reception", s:"24 hours" },
              { t:"Housekeeping", s:"Towels · turndown" },
              { t:"Concierge", s:"What's nearby?" },
              { t:"Late check-out", s:"On request" },
            ].map((a,i)=>(
              <div key={i} className="tap" style={{padding:"18px", background:"var(--surface-card)", borderRadius:16, cursor:"pointer"}}>
                <div style={{fontFamily:"var(--sans)", fontSize:16, fontWeight:700, lineHeight:1.2, color:"var(--ink)", letterSpacing:"-0.2px"}}>{a.t}</div>
                <div style={{fontSize:13, color:"var(--mute)", marginTop:6, fontWeight:500}}>{a.s}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Past orders */}
        <div className="strip" style={{paddingTop:14}}>
          <div className="strip-head">
            <div className="ttl">Past orders</div>
            <div className="more">View folio</div>
          </div>
          <div>
            {[
              { n:"#GAB4810", t:"Paneer butter masala + butter naan", a:"₹410", d:"Yesterday · 21:14", id:"pn1" },
              { n:"#GAB4801", t:"Grand executive meal pack", a:"₹250", d:"Yesterday · 13:20", id:"mp1" },
              { n:"#GAB4792", t:"Masala tea + paneer pakoda", a:"₹180", d:"7 May · 17:40", id:"bf5" },
            ].map((o,i)=>{
              const it = window.ITEMS.find(x => x.id === o.id);
              const ii = it ? imgForItem(it) : null;
              const url = ii ? imgUrl(ii.kind, 200) : null;
              return (
                <div key={o.n} className="past" onClick={()=>it && go("item",{id:it.id})}>
                  <div style={{width:52, height:52, borderRadius:"var(--r-md)", overflow:"hidden", flex:"0 0 52px", background:"var(--surface-card)"}}>
                    {url && <img src={url} alt="" decoding="async" style={{width:"100%", height:"100%", objectFit:"cover"}}/>}
                  </div>
                  <div className="body">
                    <div className="nm">{o.t}</div>
                    <div className="sub">{o.d} · {o.a}</div>
                  </div>
                  <button className="reorder" onClick={(e)=>{e.stopPropagation(); it && go("item",{id:it.id})}}>Reorder</button>
                </div>
              );
            })}
          </div>
        </div>

        {/* Feedback CTA — dark CTA strip */}
        <div style={{padding:"22px 20px 36px"}}>
          <div className="tap" onClick={()=>go("feedback")} style={{padding:"22px", background:"var(--ink)", color:"#fff", borderRadius:24}}>
            <div className="between">
              <div>
                <div className="caption" style={{marginBottom:8, color:"rgba(255,255,255,.6)"}}>The last meal</div>
                <div style={{fontWeight:700, fontSize:22, lineHeight:1.2, color:"#fff", maxWidth:"22ch", letterSpacing:"-0.5px"}}>How was the paneer butter masala?</div>
              </div>
              <span style={{width:36, height:36, borderRadius:"50%", background:"var(--saffron)", display:"inline-flex", alignItems:"center", justifyContent:"center", color:"#fff", fontWeight:700, flexShrink:0}}>→</span>
            </div>
          </div>

}

Object.assign(window, { QRLanding, Home, Menu, ItemDetail, Cart, Checkout, Payment, Tracking, Feedback, AIConcierge, Schedule, Stay });

</script>

<script type="text/babel" data-from="app.jsx">
// app.jsx — root navigation + tweaks

const { useState: uS, useEffect: uE, useMemo: uM } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "hotelName": "Grand Ashirwad Beacon",
  "guestName": "Mr. Sharma",
  "room": "412",
  "phase2": true,
  "dark": false,
  "showMixed": true,
  "currency": "INR"
}/*EDITMODE-END*/;

function App(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [stack, setStack] = uS([{ s:"qr" }]);
  const [tab, setTab] = uS("home");
  const [cart, setCart] = uS([]);
  const [toast, setToast] = uS("");
  const [aiOpen, setAiOpen] = uS(false);
  const [hasOrder, setHasOrder] = uS(false);

  const cur = stack[stack.length-1];

  const hotel = uM(()=>({
    name: t.hotelName, guest: t.guestName, room: t.room, loc:"Bhopal · ISBT Commercial Campus"
  }), [t.hotelName, t.guestName, t.room]);

  const go = (s, params)=>{
    if(s === -1){ setStack(st => st.length>1 ? st.slice(0,-1) : st); return; }
    if(s === "feedback" || s === "schedule" || s === "checkout" || s === "payment" || s === "cart" || s === "menu" || s === "item" || s === "qr" || s === "home" || s === "stay") {
      setStack(st => [...st, { s, ...params }]);
      if(s==="home") setTab("home");
      if(s==="menu") setTab("menu");
      if(s==="stay") setTab("acct");
    }
  };

  const showToast = (m)=>{
    setToast(m);
    setTimeout(()=>setToast(""), 1600);
  };

  const addToCart = (it, opts)=>{
    setCart(c => [...c, { it, ...opts }]);
    showToast(`Added · ${it.n.split(",")[0]}`);
  };

  const placeOrder = ({pay, timing, total, wa})=>{
    setHasOrder(true);
    setCart([]);
    showToast("Order placed · we'll knock when it's at the door");
    setStack([{s:"home"}]);
    setTab("home");
  };

  const tabChange = (k)=>{
    setTab(k);
    if(k==="home") setStack([{s:"home"}]);
    if(k==="menu") setStack([{s:"menu"}]);
    if(k==="acct") setStack([{s:"stay"}]);
  };

  const cartTotal = cart.reduce((s,c)=>s+c.total, 0);

  // Render screen
  let screen;
  switch(cur.s){
    case "qr":       screen = <QRLanding go={go} hotel={hotel} currency={t.currency}/>; break;
    case "home":     screen = <Home go={go} hotel={hotel} openAI={()=>setAiOpen(true)} recentOrder={hasOrder}/>; break;
    case "menu":     screen = <Menu go={go} initialCat={cur.cat} openAI={()=>setAiOpen(true)}/>; break;
    case "item":     screen = <ItemDetail id={cur.id} go={go} onAdd={addToCart}/>; break;
    case "cart":     screen = <Cart go={go} cart={cart} setCart={setCart} hotel={hotel}/>; break;
    case "checkout": screen = <Checkout go={go} cart={cart} hotel={hotel} ph2={t.phase2} onPlace={placeOrder}/>; break;
    case "payment":  screen = <Payment go={go} total={cur.total} onSuccess={()=> placeOrder({pay:"now", timing:"asap", total:cur.total, wa:true}) }/>; break;
    case "feedback": screen = <Feedback go={go}/>; break;
    case "schedule": screen = <Schedule go={go} onSchedule={()=>{ showToast("Pre-order confirmed"); go("home"); }}/>; break;
    case "stay":     screen = <Stay go={go} hotel={hotel}/>; break;
    default: screen = <div className="pad">Not found</div>;
  }

  // Persistent CartButton on browse screens, FAB on a few
  const showTab = ["home","menu","stay"].includes(cur.s);
  const showCartFloat = cur.s !== "cart" && cur.s !== "checkout" && cur.s !== "payment" && cur.s !== "feedback" && cur.s !== "qr" && cart.length>0;

  return (
    <>
      <div className={"stage " + (t.dark?"dark":"")}>
        {screen}

        {/* Floating cart bar — visible on home, menu, item */}
        {showCartFloat ? (
          <div style={{position:"absolute", left:0, right:0, bottom: showTab ? 60 : 0, padding:10, background:"linear-gradient(to top, var(--paper) 60%, transparent)"}}>
            <button className="btn" onClick={()=>go("cart")}>
              <span className="label">
                <span className="num" style={{fontSize:10, opacity:.6, letterSpacing:".14em", textTransform:"uppercase"}}>Cart · {cart.length} {cart.length===1?"item":"items"}</span>
                <span style={{fontSize:14, fontWeight:500}}>View order</span>
              </span>
              <span className="num" style={{fontSize:13}}>{fmt(cartTotal, t.currency || "INR")} →</span>
            </button>
          </div>
        ) : null}

        {/* Tab bar on main destinations */}
        {showTab && cur.s !== "qr" ? (
          <TabBar active={tab} onChange={tabChange} cartCount={cart.length}/>
        ) : null}

        {/* AI concierge overlay */}
        {aiOpen && t.phase2 ? (
          <div style={{position:"absolute", inset:0, zIndex:25, background:"var(--paper)"}}>
            <AIConcierge onClose={()=>setAiOpen(false)} onAddToCart={(it,opts)=>{ addToCart(it,opts); }} go={go}/>
          </div>
        ) : null}

        <Toast msg={toast}/>
      </div>

      <TweaksPanel>
        <TweakSection label="Hotel"/>
        <TweakText label="Hotel name" value={t.hotelName} onChange={(v)=>setTweak("hotelName", v)}/>
        <TweakText label="Guest name" value={t.guestName} onChange={(v)=>setTweak("guestName", v)}/>
        <TweakText label="Room"       value={t.room}       onChange={(v)=>setTweak("room", v)}/>

        <TweakSection label="Phase 2 features"/>
        <TweakToggle label="Phase 2 enabled"        value={t.phase2}    onChange={(v)=>setTweak("phase2", v)}/>

        <TweakSection label="Display"/>
        <TweakToggle label="Dark mode" value={t.dark} onChange={(v)=>setTweak("dark", v)}/>
        <TweakSelect label="Currency"  value={t.currency} options={["INR","USD","EUR"]} onChange={(v)=>setTweak("currency", v)}/>

        <TweakSection label="Jump to screen"/>
        <TweakButton label="QR landing"      onClick={()=>setStack([{s:"qr"}])}/>
        <TweakButton label="Home"            onClick={()=>{setStack([{s:"home"}]); setTab("home");}}/>
        <TweakButton label="Menu"            onClick={()=>{setStack([{s:"menu"}]); setTab("menu");}}/>
        <TweakButton label="Item detail"     onClick={()=>setStack([{s:"home"},{s:"menu"},{s:"item", id:"i3"}])}/>
        <TweakButton label="Cart (with items)" onClick={()=>{
          if(cart.length===0){
            setCart([
              {it:window.ITEMS[0], qty:1, size:"regular", spice:"medium", extras:[], note:"", total:780},
              {it:window.ITEMS[2], qty:1, size:"regular", spice:"medium", extras:["truff"], note:"Vegetarian, please", total:1540},
            ]);
          }
          setStack([{s:"home"},{s:"cart"}]);
        }}/>
        <TweakButton label="Checkout"        onClick={()=>setStack([{s:"home"},{s:"cart"},{s:"checkout"}])}/>
        <TweakButton label="Payment"         onClick={()=>setStack([{s:"home"},{s:"cart"},{s:"checkout"},{s:"payment", total:3240}])}/>
        <TweakButton label="Feedback"        onClick={()=>setStack([{s:"home"},{s:"feedback"}])}/>
        <TweakButton label="AI concierge"    onClick={()=>setAiOpen(true)}/>
        <TweakButton label="Schedule"        onClick={()=>setStack([{s:"home"},{s:"schedule"}])}/>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
